<style>
:root{--bg:#0a0a0f;--card:#111118;--card2:#15151d;--border:#1c1c25;--text:#e4e4e7;--muted:#6b7280;--dim:#3a3a44;--amber:#f59e0b;--green:#10b981;--green2:#34d399;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--purple:#a78bfa;--cyan:#22d3ee;--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono','Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}button{font-family:var(--font);cursor:pointer}
@keyframes glow{0%{box-shadow:0 0 4px rgba(0,229,255,.3)}100%{box-shadow:0 0 12px rgba(0,229,255,.5),0 0 20px rgba(124,58,237,.3)}}
.jarvis-panel{position:fixed;right:0;top:0;width:420px;height:100vh;background:#0d0d14;border-left:1px solid var(--border);z-index:1000;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease}
.jarvis-panel.open{transform:translateX(0)}
.jarvis-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.jarvis-msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.jarvis-msg{max-width:95%;padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.jarvis-msg.user{align-self:flex-end;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:#00e5ff}
.jarvis-msg.ai{align-self:flex-start;background:var(--card2);border:1px solid var(--border);color:var(--text)}
.jarvis-msg.ai .thinking{color:var(--muted);font-style:italic}
.jarvis-input{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.jarvis-input input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:var(--font)}
.jarvis-input button{background:linear-gradient(135deg,#00e5ff,#7c3aed);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600}
.topnav{display:flex;gap:0;border-bottom:1px solid var(--border);background:#08080d}
.topnav a{padding:10px 20px;font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
.topnav a.on{color:var(--purple);border-bottom-color:var(--purple)}
.topnav a:hover{color:var(--text);background:rgba(255,255,255,.02)}
.hdr{background:linear-gradient(135deg,#0a0a0f,#14141e);padding:14px 22px}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-0.02em}.hdr .sub{font-size:10px;color:var(--muted);margin-top:1px}
.ctrl{display:flex;gap:6px;padding:10px 22px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#0c0c12}
.ctrl select{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;font-family:var(--mono)}
.ctrl label{font-size:10px;color:var(--muted);font-weight:600}
.ctrl input[type=date]{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:10px;font-family:var(--mono)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.fbtn{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .12s;white-space:nowrap}
.fbtn.on{border-color:var(--purple);background:rgba(167,139,250,.1);color:var(--purple)}
.fbtn.brand-on{border-color:var(--amber);background:rgba(245,158,11,.08);color:var(--amber)}
.fbtn.generic-on{border-color:var(--blue);background:rgba(59,130,246,.08);color:var(--blue)}
.fbtn.comp-on{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red)}
.fbtn:hover{background:var(--card2)}
.fbtn .cnt{font-size:9px;opacity:.7;margin-left:3px}
.sbox{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;font-family:var(--mono)}
.vtabs{display:flex;gap:0;padding:0 22px;border-bottom:1px solid var(--border)}
.vtab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.vtab.on{color:var(--text);border-bottom-color:var(--purple)}
.vtab:hover{color:var(--text)}
.sts{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:10px 22px}
.st{background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}.st .lb{font-size:8px;color:#555;letter-spacing:.08em;margin-bottom:3px;text-transform:uppercase}.st .vl{font-size:17px;font-weight:700;font-family:var(--mono)}.st .ch{font-size:9px;margin-top:2px}
.brand-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 22px 10px}
.brand-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s}
.brand-card:hover{border-color:var(--purple);background:var(--card2)}
.brand-card.active{border-color:var(--purple);background:rgba(167,139,250,.05)}
.bc-name{font-size:13px;font-weight:700;margin-bottom:8px}.bc-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;font-family:var(--mono)}.bc-label{color:var(--muted);font-size:9px;font-family:var(--font)}.bc-val{font-weight:600}
.sec{padding:0 22px 14px}.sec-title{font-size:12px;font-weight:600;margin-bottom:6px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:7px 8px;font-size:8px;color:#555;letter-spacing:.06em;font-weight:500;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th.r{text-align:right}.tbl th.c{text-align:center}.tbl th:hover{color:var(--text)}
.tbl td{padding:6px 8px;border-bottom:1px solid #0e0e14;vertical-align:middle}
.tbl td.r{text-align:right;font-family:var(--mono);font-size:10px}.tbl td.c{text-align:center}
.tbl tr:hover{background:#15151d}.tbl tr.drill{cursor:pointer}.tbl tr.drill:hover{background:#1a1a24}
.tbl-wrap{background:var(--card);border-radius:8px;border:1px solid var(--border);overflow:auto;max-height:480px}
.kw{font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.camp-col{font-size:9px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-block;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:600}
.type-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}
.type-brand{background:rgba(245,158,11,.12);color:var(--amber)}.type-generic{background:rgba(59,130,246,.12);color:var(--blue)}.type-comp{background:rgba(239,68,68,.12);color:var(--red)}
.chart-wrap{background:var(--card);border-radius:8px;border:1px solid var(--border);padding:14px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 22px 12px}
.chart-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 22px 12px}
.chart-label{font-size:11px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 22px 12px}
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.ins-card h3{font-size:11px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.ins-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;border-bottom:1px solid #0e0e14}
.ins-row:last-child{border-bottom:none}
.ins-bar{height:6px;border-radius:3px;margin-top:4px}
.wow-up{color:var(--green)}.wow-down{color:var(--red)}
.mover-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11px;border-bottom:1px solid #0e0e14}
.mover-row:last-child{border-bottom:none}
.mover-kw{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.back-btn{font-size:11px;color:var(--purple);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}.back-btn:hover{text-decoration:underline}
.prod-row{display:flex;align-items:center;gap:10px}
.prod-img{width:44px;height:44px;border-radius:6px;border:1px solid var(--border);object-fit:contain;background:var(--card2)}
.prod-info{flex:1;min-width:0}
.prod-sku{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-asin{font-size:9px;font-family:var(--mono);color:var(--muted)}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 22px 12px}
.perf-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.perf-card h3{font-size:11px;font-weight:600;margin-bottom:8px;color:var(--muted)}
.perf-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0e0e14;font-size:11px}
.perf-item:last-child{border-bottom:none}
.perf-rank{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--mono)}
.perf-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.perf-val{font-family:var(--mono);font-weight:600;font-size:10px}
.growth-up{color:var(--green)}.growth-down{color:var(--red)}.growth-flat{color:var(--dim)}
.ld{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:var(--muted)}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{padding:30px;text-align:center;color:var(--dim);font-size:12px}
@media(max-width:800px){.sts{grid-template-columns:repeat(3,1fr)}.chart-row,.chart-row3,.insight-grid{grid-template-columns:1fr}.brand-cards{grid-template-columns:1fr}}
.dp-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding-top:80px}
.dp-modal{background:#1a1a24;border:1px solid var(--border);border-radius:12px;display:flex;box-shadow:0 20px 60px rgba(0,0,0,.6);max-width:680px;width:100%}
.dp-presets{width:160px;border-right:1px solid var(--border);padding:12px 0;display:flex;flex-direction:column;gap:1px}
.dp-preset{padding:8px 16px;font-size:12px;color:var(--muted);cursor:pointer;border:none;background:none;text-align:left;font-family:var(--font);transition:all .1s}
.dp-preset:hover{background:rgba(167,139,250,.08);color:var(--text)}
.dp-preset.active{background:rgba(167,139,250,.12);color:var(--purple);font-weight:600}
.dp-cals{flex:1;padding:16px}
.dp-cals-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
.dp-cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dp-cal-hdr span{font-size:13px;font-weight:600;color:var(--text)}
.dp-cal-nav{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.dp-cal-nav:hover{background:var(--card2);color:var(--text)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center}
.dp-dow{font-size:9px;color:var(--dim);padding:4px 0;font-weight:600}
.dp-day{font-size:11px;padding:6px 2px;cursor:pointer;border-radius:4px;color:var(--muted);transition:all .1s}
.dp-day:hover{background:rgba(167,139,250,.15);color:var(--text)}
.dp-day.today{border:1px solid var(--purple)}
.dp-day.in-range{background:rgba(167,139,250,.1);color:var(--text)}
.dp-day.range-start,.dp-day.range-end{background:var(--purple);color:#000;font-weight:700;border-radius:4px}
.dp-day.other{color:var(--dim);opacity:.4}
.dp-day.empty{cursor:default}
.dp-footer{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.dp-btn{padding:7px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);font-family:var(--font)}
.dp-btn.cancel{background:var(--card);color:var(--muted)}.dp-btn.cancel:hover{background:var(--card2);color:var(--text)}
.dp-btn.apply{background:var(--purple);color:#000;border-color:var(--purple)}.dp-btn.apply:hover{opacity:.9}
.dp-range-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.dp-range-btn:hover{border-color:var(--purple);background:var(--card2)}
.dp-range-btn .arrow{font-size:8px;color:var(--muted)}
.more-toggle{padding:2px 22px;text-align:center}
.more-btn{font-size:9px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--font);padding:3px 10px;border-radius:4px}
.more-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.chart-nav{display:flex;align-items:center;gap:6px}
.chart-nav-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0}
.chart-nav-btn:hover{background:var(--card2);color:var(--text)}
.chart-dots{display:flex;gap:4px}
.chart-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);cursor:pointer}
.chart-dot.active{background:var(--purple)}
/* ASIN Drill-Down */
.asin-drill-row td{padding:0!important;border-bottom:2px solid var(--purple)!important}
.asin-drill-panel{background:#0d0d14;border-top:1px solid var(--border);padding:16px 20px 18px;animation:drillIn .18s ease}
@keyframes drillIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.drill-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.drill-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.drill-close{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.drill-close:hover{color:var(--red);border-color:var(--red)}
.drill-kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
.dk{background:var(--card);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.dk .lb{font-size:7px;color:#555;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.dk .vl{font-size:13px;font-weight:700;font-family:var(--mono)}
.drill-charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.drill-chart-wrap{background:var(--card);border-radius:7px;border:1px solid var(--border);padding:10px 12px}
.drill-chart-label{font-size:9px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.drill-toggle{display:flex;gap:4px;margin-bottom:10px}
.drill-toggle-btn{padding:3px 10px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:var(--font)}
.drill-toggle-btn.on{border-color:var(--purple);background:rgba(167,139,250,.1);color:var(--purple)}
</style>
</head>

// Campaigns derived from products + ad_groups
function processCamps(bds){
  const c={};const dateFiltered=!isDateAll();const{start,end}=dateFiltered?getDateRange():{start:'',end:''};
  const ct=S.campType||'all';
  
  if(!dateFiltered){
    // No date filter: use ad_groups totals (most accurate for SP)
    bds.forEach(bd=>{
      const ag=bd.ad_groups||{};
      Object.entries(ag).forEach(([camp,groups])=>{
        const k=`${bd.brand}::SP::${camp}`;
        if(!c[k])c[k]={name:camp,brand:bd.brand,spend:0,sales:0,clicks:0,impr:0,units:0,days:{},budget:0,adType:'SP'};
        const x=c[k];
        Object.values(groups).forEach(g=>{
          x.spend+=g.spend||0;x.sales+=g.sales||0;x.clicks+=g.clicks||0;x.impr+=g.impr||0;x.units+=g.units||0;
        });
      });
    });
  } else {
    // Date filtered: use ad_groups totals but scale proportionally by product daily data
    bds.forEach(bd=>{
      // First get total and filtered product spend per brand to compute ratio
      let totalProdSpend=0,filtProdSpend=0;
      (bd.products||[]).forEach(p=>{
        totalProdSpend+=p.sp_spend||0;
        Object.entries(p.days||{}).forEach(([d,v])=>{
          if(d>=start&&d<=end)filtProdSpend+=v.sp_spend||0;
        });
      });
      const ratio=totalProdSpend>0?(filtProdSpend/totalProdSpend):0;
      const ag=bd.ad_groups||{};
      Object.entries(ag).forEach(([camp,groups])=>{
        const k=`${bd.brand}::SP::${camp}`;
        if(!c[k])c[k]={name:camp,brand:bd.brand,spend:0,sales:0,clicks:0,impr:0,units:0,days:{},budget:0,adType:'SP'};
        const x=c[k];
        Object.values(groups).forEach(g=>{
          x.spend+=Math.round((g.spend||0)*ratio);x.sales+=Math.round((g.sales||0)*ratio);
          x.clicks+=Math.round((g.clicks||0)*ratio);x.units+=Math.round((g.units||0)*ratio);
        });
      });
    });
  }
  
  // SB Campaigns (have daily data — always date-filterable)
  bds.forEach(bd=>{
    (bd.sb_campaigns_data||[]).forEach(r=>{
      const cn=r.campaignName||'?';
      const k=`${bd.brand}::SB::${cn}`;
      if(!c[k])c[k]={name:cn,brand:bd.brand,spend:0,sales:0,clicks:0,impr:0,units:0,days:{},budget:0,adType:'SB'};
      const x=c[k];
      if(dateFiltered&&r.days&&Object.keys(r.days).length){
        Object.entries(r.days).forEach(([d,v])=>{
          if(d>=start&&d<=end){
            x.spend+=v.spend||0;x.sales+=v.sales||0;x.clicks+=v.clicks||0;
          }
        });
      } else {
        x.spend+=r.spend||0;x.sales+=r.sales||0;x.clicks+=r.clicks||0;x.impr+=r.impr||0;x.units+=r.units||0;
      }
      if(r.budget)x.budget=parseFloat(r.budget);
    });
  });
  
  let result=Object.values(c).filter(x=>x.spend>0||x.sales>0);
  if(ct!=='all')result=result.filter(x=>x.adType===ct.toUpperCase());
  return result.map(x=>{x.acos=x.sales>0?(x.spend/x.sales*100):(x.spend>0?Infinity:0);return x}).sort((a,b)=>b.spend-a.spend);
}
function filterObj(t,o){
  // Compute median CPC for optimize filter
  const cpcs=t.filter(x=>x.cpc>0).map(x=>x.cpc).sort((a,b)=>a-b);
  const medCpc=cpcs.length>0?cpcs[Math.floor(cpcs.length/2)]:0;
  switch(o){
    case'bleeding':return t.filter(x=>(isFinite(x.acos)&&x.acos>90&&x.spend>500)||(!isFinite(x.acos)&&x.spend>500));
    case'scale':return t.filter(x=>isFinite(x.acos)&&x.acos>0&&x.acos<=30&&x.sales>500);
    case'optimize':return t.filter(x=>isFinite(x.acos)&&x.acos>50&&x.acos<=90&&x.cpc>medCpc);
    case'opportunities':return t.filter(x=>x.clicks>=10&&x.cvr>=8&&x.spend<2000);
    case'org_strong':return t.filter(x=>x.orgRank&&x.orgRank<=5&&x.spend>200);
    case'no_org':return t.filter(x=>!x.orgRank);
    default:return t;
  }
}

// Get advertised ASINs for a search term via campaign+adGroup→ASIN mapping
function getTermAsins(bds,t){
  const asins=new Set();
  const camps=t.campaignList||[];const ags=[...(t.adGroups||[])];
  bds.forEach(bd=>{
    const agData=bd.ad_groups||{};
    camps.forEach(camp=>{
      const groups=agData[camp]||{};
      if(ags.length){
        ags.forEach(ag=>{(groups[ag]?.asins||[]).forEach(a=>asins.add(a));});
      }else{
        Object.values(groups).forEach(g=>{(g.asins||[]).forEach(a=>asins.add(a));});
      }

  });
  return [...asins];
}

function totals(t){const T={spend:0,sales:0,clicks:0,impr:0,units:0};t.forEach(x=>{T.spend+=x.spend;T.sales+=x.sales;T.clicks+=x.clicks;T.impr+=x.impr;T.units+=x.units});T.acos=T.sales>0?(T.spend/T.sales*100):0;T.cpc=T.clicks>0?(T.spend/T.clicks):0;T.cvr=T.clicks>0?(T.units/T.clicks*100):0;return T;}

let dpState={open:false,selStart:null,selEnd:null,month1:null,month2:null,hovering:null};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FULL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const PRESETS=[
  {l:'Today',fn:()=>{const t=new Date();return{s:fmtD(t),e:fmtD(t)}}},
  {l:'Yesterday',fn:()=>{const t=new Date();t.setDate(t.getDate()-1);return{s:fmtD(t),e:fmtD(t)}}},
  {l:'Last 7 days',fn:()=>{const e=new Date();const s=new Date();s.setDate(s.getDate()-6);return{s:fmtD(s),e:fmtD(e)}}},
  {l:'This week',fn:()=>{const t=new Date();const d=t.getDay();const s=new Date(t);s.setDate(t.getDate()-d);return{s:fmtD(s),e:fmtD(t)}}},
  {l:'Last week',fn:()=>{const t=new Date();const d=t.getDay();const e=new Date(t);e.setDate(t.getDate()-d-1);const s=new Date(e);s.setDate(e.getDate()-6);return{s:fmtD(s),e:fmtD(e)}}},
  {l:'Last 30 days',fn:()=>{const e=new Date();const s=new Date();s.setDate(s.getDate()-29);return{s:fmtD(s),e:fmtD(e)}}},
  {l:'This month',fn:()=>{const t=new Date();return{s:`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-01`,e:fmtD(t)}}},
  {l:'Last month',fn:()=>{const t=new Date();const lm=new Date(t.getFullYear(),t.getMonth(),0);const s=new Date(lm.getFullYear(),lm.getMonth(),1);return{s:fmtD(s),e:fmtD(lm)}}},
  {l:'Year to date',fn:()=>{const t=new Date();return{s:`${t.getFullYear()}-01-01`,e:fmtD(t)}}},

function fmtD(d){return d.toISOString().slice(0,10);}
function fmtDisplay(ds){if(!ds||ds==='2000-01-01')return'All time';const d=new Date(ds+'T00:00:00');return`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
function getDateLabel(){if(S.datePeriod==='all')return'All time';if(S.datePeriod==='custom'&&S.dateStart&&S.dateEnd)return`${fmtDisplay(S.dateStart)} – ${fmtDisplay(S.dateEnd)}`;const p=PRESETS.find(p=>{const r=p.fn();const{start,end}=getDateRange();return r.s===start&&(r.e===end||end==='9999-12-31');});return p?p.l:S.datePeriod;}

function openDatePicker(target){

function dpClickDay(ds){

function renderCal(year,month){
  const today=fmtD(new Date());
  const first=new Date(year,month,1);const startDow=first.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let h=`<div class="dp-cal-hdr"><span>${FULL_MONTHS[month]} ${year}</span></div>`;
  h+=`<div class="dp-grid">`;
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{h+=`<div class="dp-dow">${d}</div>`;});
  for(let i=0;i<startDow;i++)h+=`<div class="dp-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls='dp-day';
    if(ds===today)cls+=' today';
    const ss=dpState.selStart,se=dpState.selEnd||dpState.hovering;
    if(ss&&se){const lo=ss<se?ss:se,hi=ss<se?se:ss;if(ds===lo)cls+=' range-start';else if(ds===hi)cls+=' range-end';else if(ds>lo&&ds<hi)cls+=' in-range';}
    else if(ss&&ds===ss)cls+=' range-start';
    h+=`<div class="${cls}" onclick="dpClickDay('${ds}')" onmouseenter="dpHoverDay('${ds}')">${d}</div>`;
  }
  h+=`</div>`;return h;
}
function renderDatePicker(){

  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button class="dp-cal-nav" onclick="dpNav(-1)">‹</button><div style="display:flex;gap:40px"><span style="font-size:13px;font-weight:600">${FULL_MONTHS[m1.getMonth()]} ${m1.getFullYear()}</span><span style="font-size:13px;font-weight:600">${FULL_MONTHS[m2.getMonth()]} ${m2.getFullYear()}</span></div><button class="dp-cal-nav" onclick="dpNav(1)">›</button></div>`;
  h+=`<div class="dp-cals-row"><div>${renderCal(m1.getFullYear(),m1.getMonth())}</div><div>${renderCal(m2.getFullYear(),m2.getMonth())}</div></div>`;
  h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">${dpState.selStart?fmtDisplay(dpState.selStart):'Select start'} ${dpState.selEnd?' – '+fmtDisplay(dpState.selEnd):''}</div>`;
  h+=`<div class="dp-footer"><button class="dp-btn cancel" onclick="closeDatePicker()">Cancel</button><button class="dp-btn apply" onclick="applyDatePicker()">Apply</button></div>`;
  h+=`</div></div></div>`;
  el.innerHTML=h;
}

// ── RENDER ──
function render(){
  try{
  _asinCampCache=null; // invalidate ASIN→Campaign cache
  // Update top nav highlighting
  const navAds=document.getElementById('nav-ads');
  const navBiz=document.getElementById('nav-biz');
  if(navAds)navAds.className=S.page==='ads'?'on':'';
  if(navBiz)navBiz.className=S.page==='business'?'on':'';
  const navRange=document.getElementById('nav-range');
  if(navRange)navRange.className=S.page==='range'?'on':'';
  
  destroyCharts();const allBrands=getAllBD();
  if(!allBrands.length){document.getElementById('app').innerHTML='<div class="empty">No data found.</div>';return;}
  const bds=getFiltBD();const rm=getRankMap();
  // Range Intel page — skip regular header/controls
  if(S.page==='range'){renderRangeIntel('',bds);return;}
  if(S.drillType==='campaign'||S.drillType==='adgroup')return renderDrill(S.drillType,bds,rm);
  if(S.drillType==='asin')return renderDrill('asin',bds,rm);
  // PRIMARY: Product data
  const allAsins=processAsins(bds);
  const allCamps=processCamps(bds);
  // SECONDARY: Search terms for B/G/C + terms tab
  const allTerms=processTerms(bds,rm);
  const typeSplits=getAsinTypeSplits(bds);
  
  // Step 1: Filter search terms by category/range
  // Uses CAMP_ASIN_MAP (from SP Search Term Report): campaign → advertised ASINs
  // For each camp_data entry: lookup campaign's ASINs → getAsinInfo(asin).r/c → match filter
  let catRangeTerms=allTerms;
  if((S.catFilter&&S.catFilter!=='all')||(S.rangeFilter&&S.rangeFilter!=='all')){
    const hasCat=S.catFilter&&S.catFilter!=='all';
    const hasRange=S.rangeFilter&&S.rangeFilter!=='all';
    // Does a campaign PRIMARILY target ASINs matching the active filter?
    // Requires >50% of campaign's ASINs to match — eliminates catch-all BRAND campaigns
    const campMatchesFilter=(camp)=>{
      const asins=CAMP_ASIN_MAP[camp];
      if(!asins||!asins.length)return false;
      let match=0;
      asins.forEach(a=>{
        const info=getAsinInfo(a);
        let ok=true;
        if(hasCat&&info.c!==S.catFilter)ok=false;
        if(hasRange&&info.r!==S.rangeFilter)ok=false;
        if(ok)match++;
      });
      return match/asins.length>0.5;
    };
    // Re-aggregate: only sum camp_data entries whose campaign targets filtered ASINs
    const ft={};
    const dateFiltered=!isDateAll();const{start:ds,end:de}=dateFiltered?getDateRange():{start:'',end:''};
    bds.forEach(bd=>{
      (bd.search_terms||[]).forEach(r=>{
        const kw=r.keyword||'';if(!kw)return;
        const matchedCD=(r.camp_data||[]).filter(cd=>campMatchesFilter(cd.campaign));
        if(!matchedCD.length)return;
        if(!ft[kw])ft[kw]={keyword:kw,spend:0,sales:0,clicks:0,impr:0,units:0,
          campaigns:new Set(),matchTypes:new Set(),adGroups:new Set(),
          type:r.type||'generic',brands:new Set(),camp_data:[],days:{}};
        const x=ft[kw];
        matchedCD.forEach(cd=>{
          x.spend+=cd.spend||0;x.sales+=cd.sales||0;x.clicks+=cd.clicks||0;
          x.units+=cd.units||0;x.impr+=cd.impr||0;
          x.campaigns.add(cd.campaign);
          const ex=x.camp_data.find(c=>c.campaign===cd.campaign);
          if(ex){ex.spend+=cd.spend||0;ex.sales+=cd.sales||0;ex.clicks+=cd.clicks||0;ex.units+=cd.units||0;}
          else x.camp_data.push({...cd});
        });
        (r.matchTypes||[]).forEach(m=>x.matchTypes.add(m));
        (r.adGroups||[]).forEach(a=>x.adGroups.add(a));
        x.brands.add(bd.brand||'');
        // NOTE: r.days is keyword-level daily data (ALL campaigns combined),
        // NOT per-campaign. We cannot use it to override spend when filtering
        // by range/category, as it would inflate metrics with non-matching campaigns.
        // Daily chart data is omitted for filtered views — camp_data totals are authoritative.
      });
    });
    const rm2=rm||{};
    catRangeTerms=Object.values(ft).filter(x=>x.spend>0||x.sales>0||x.clicks>0).map(x=>{
      const rk=rm2[x.keyword];x.acos=x.sales>0?(x.spend/x.sales*100):(x.spend>0?Infinity:0);
      x.ctr=x.impr>0?(x.clicks/x.impr*100):0;x.cvr=x.clicks>0?(x.units/x.clicks*100):0;
      x.cpc=x.clicks>0?(x.spend/x.clicks):0;x.orgRank=rk?.rank||null;
      x.campaignList=[...x.campaigns];x.matchList=[...x.matchTypes];
      x.camp_data.sort((a,b)=>(b.spend||0)-(a.spend||0));
      x.camp_data.forEach(cd=>{cd.acos=cd.sales>0?(cd.spend/cd.sales*100):(cd.spend>0?999:0);cd.cpc=cd.clicks>0?(cd.spend/cd.clicks):0;cd.cvr=cd.clicks>0?(cd.units/cd.clicks*100):0;});
      return x;
    });
  }
  // Also filter by ASIN search box
  if(S.asinFilter&&S.asinFilter.length>=3){const af=S.asinFilter.toUpperCase();const ma=allAsins.filter(a=>a.asin.toUpperCase().includes(af)||(a.sku&&a.sku.toUpperCase().includes(af)));if(ma.length){const ac=new Set();ma.forEach(a=>{getAsinCampaigns(bds,a.asin).forEach(c=>ac.add(c))});catRangeTerms=catRangeTerms.filter(x=>x.campaignList.some(c=>ac.has(c)));}}
  // Also filter by keyword search
  if(S.search){const q=S.search.toLowerCase();catRangeTerms=catRangeTerms.filter(x=>x.keyword.toLowerCase().includes(q)||x.campaignList.join(' ').toLowerCase().includes(q));}
  
  // Step 2: B/G/C computed from category/range filtered terms (BEFORE obj/type filter)
  const typeSpend={brand:0,generic:0,comp:0};
  catRangeTerms.forEach(t=>{typeSpend[t.type]=(typeSpend[t.type]||0)+t.spend;});
  
  // Step 3: Apply obj filter (bleeding/scale etc) and type filter (brand/generic/comp)
  let terms=filterObj(catRangeTerms,S.obj);
  terms=filterType(terms,S.termType);  terms.sort((a,b)=>{let va=a[S.sortCol]??-Infinity,vb=b[S.sortCol]??-Infinity;if(!isFinite(va))va=999999;if(!isFinite(vb))vb=999999;return(va-vb)*S.sortDir;});
  const T=totals(terms);
  // TOP-LINE KPIs: from daily_totals (has SP+SD+SB with splits)
  const ct=S.campType||'all';
  let prodSpend=0,prodSales=0,prodClicks=0,prodUnits=0,prodImpr=0;
  bds.forEach(bd=>{
    const fdt=filterDailyTotals(bd.daily_totals||{});
    Object.values(fdt).forEach(v=>{
      if(ct==='sp'){prodSpend+=v.sp_spend||0;prodSales+=v.sp_sales||0;}
      else if(ct==='sd'){prodSpend+=v.sd_spend||0;prodSales+=v.sd_sales||0;}
      else if(ct==='sb'){prodSpend+=v.sb_spend||0;prodSales+=v.sb_sales||0;}
      else{prodSpend+=v.spend||0;prodSales+=v.sales||0;}
      prodClicks+=v.clicks||0;prodUnits+=v.units||0;prodImpr+=v.impr||0;
    });
  });
  // For SP/SD, override clicks/units/impr from processAsins (more accurate per-ASIN)
  if(ct==='sp'||ct==='sd'||ct==='all'){
    prodClicks=0;prodUnits=0;prodImpr=0;
    allAsins.forEach(a=>{prodClicks+=a.clicks;prodUnits+=a.units;prodImpr+=a.impr||0;});
    // Add SB clicks/units/impr when All
    if(ct==='all'){
      bds.forEach(bd=>{const fdt=filterDailyTotals(bd.sb_daily||{});Object.values(fdt).forEach(v=>{
        prodClicks+=v.clicks||0;prodUnits+=v.units||0;prodImpr+=v.impr||0;
      });});
    }
  }
  // SB-only: use sb_daily for clicks/units/impr
  if(ct==='sb'){
    prodClicks=0;prodUnits=0;prodImpr=0;
    bds.forEach(bd=>{const fdt=filterDailyTotals(bd.sb_daily||{});Object.values(fdt).forEach(v=>{
      prodClicks+=v.clicks||0;prodUnits+=v.units||0;prodImpr+=v.impr||0;
    });});
  }
  const isBGCFilter=S.termType!=='all';
  const topSpend=isBGCFilter?T.spend:prodSpend;
  const topSales=isBGCFilter?T.sales:prodSales;
  const topClicks=isBGCFilter?T.clicks:prodClicks;
  const topUnits=isBGCFilter?T.units:prodUnits;
  const topImpr=isBGCFilter?T.impr:prodImpr;
  const topAcos=topSales>0?(topSpend/topSales*100):0;
  const topCpc=topClicks>0?(topSpend/topClicks):0;
  const topCvr=topClicks>0?(topUnits/topClicks*100):0;
  const topCac=topUnits>0?(topSpend/topUnits):0;
  const topRoas=topSpend>0?(topSales/topSpend):0;
  const topCtr=topImpr>0?(topClicks/topImpr*100):0;
  const bleed=allTerms.filter(x=>(isFinite(x.acos)&&x.acos>90&&x.spend>500)||(!isFinite(x.acos)&&x.spend>500));
  const wastedSpend=bleed.reduce((s,x)=>s+x.spend,0);
  const hasTypeFilter=isBGCFilter||S.obj!=='all'||S.search||S.asinFilter;
  // WoW: use last 7 days of data and prev 7 days (relative to data, not today)
  // Find the latest date in the data
  let maxDate='';
  allTerms.forEach(x=>{Object.keys(x.days||{}).forEach(d=>{if(d>maxDate)maxDate=d;});});
  if(!maxDate){bds.forEach(bd=>{Object.keys(bd.daily_totals||{}).forEach(d=>{if(d>maxDate)maxDate=d;});});}
  const endDt=maxDate?new Date(maxDate+'T00:00:00'):new Date();
  const d7=new Date(endDt);d7.setDate(d7.getDate()-7);const s7=d7.toISOString().slice(0,10);
  const d14=new Date(endDt);d14.setDate(d14.getDate()-14);const s14=d14.toISOString().slice(0,10);
  const sEnd=endDt.toISOString().slice(0,10);
  const twType={brand:0,generic:0,comp:0},pwType={brand:0,generic:0,comp:0};
  allTerms.forEach(x=>{const d=x.days||{};Object.entries(d).forEach(([dt,v])=>{if(dt>s7&&dt<=sEnd){twType[x.type]=(twType[x.type]||0)+(v.spend||0);}else if(dt>s14&&dt<=s7){pwType[x.type]=(pwType[x.type]||0)+(v.spend||0);}});});
  // Top movers
  const thisWeek=[],prevWeek=[];
  allTerms.forEach(x=>{let tw=0,pw=0;Object.entries(x.days||{}).forEach(([dt,v])=>{if(dt>s7&&dt<=sEnd)tw+=v.spend||0;else if(dt>s14&&dt<=s7)pw+=v.spend||0;});if(tw>0)thisWeek.push({keyword:x.keyword,spend:tw});if(pw>0)prevWeek.push({keyword:x.keyword,spend:pw});});
  const fl=S.obj!=='all'||S.termType!=='all'||S.search||S.asinFilter;
  const brandNames=allBrands.map(d=>d.brand);

  // Top movers (last 7 vs prev 7)
  const twMap={};thisWeek.forEach(x=>{twMap[x.keyword]=x.spend});
  const pwMap={};prevWeek.forEach(x=>{pwMap[x.keyword]=x.spend});
  const moversUp=Object.keys(twMap).map(k=>({kw:k,cur:twMap[k],prev:pwMap[k]||0,diff:twMap[k]-(pwMap[k]||0)})).filter(x=>x.diff>100&&x.prev>0).sort((a,b)=>b.diff-a.diff).slice(0,8);
  const moversDown=Object.keys(pwMap).map(k=>({kw:k,cur:twMap[k]||0,prev:pwMap[k],diff:(twMap[k]||0)-pwMap[k]})).filter(x=>x.diff<-100&&x.prev>0).sort((a,b)=>a.diff-b.diff).slice(0,8);

      // ═══ ASIN P&L — ALL ASINs with Sales%, Spend%, ASP, DRR + Comparison ═══

          if(drlSa&&drlSa.daily){Object.entries(drlSa.daily).forEach(([d,v])=>{if(d<drlS||d>drlE)return;if(!drlDays[d])drlDays[d]={net:0,units:0,spend:0,adSales:0,clicks:0,hasSales:false,hasAd:false};drlDays[d].net+=v.net||0;drlDays[d].units+=v.units||0;drlDays[d].hasSales=true;});}

  if(S.tab==='overview'){

    // ASIN table — B/G/C filter shows type spend + % of total

    const st={spend:0,sales:0,clicks:0,units:0,typeSpd:0};

      o+=`<td class="c" style="font-size:9px">${tCtr.toFixed(2)}%</td>`;
      o+=`</tr></tbody></table></div></div>`;
    }

    o+=`<div class="ins-row" style="font-weight:600;margin-top:4px"><span>Total</span><span style="font-family:var(--mono);font-size:10px">${fmt(twTotal)} ${wowArrow(twTotal,pwTotal)}</span></div>`;

        o+=`<td class="r" style="font-size:10px;color:var(--green)">${fmt(cd.sales)}</td>`;
        o+=`<td></td>`;
        o+=`<td class="c"><span style="color:${cAcosC};font-size:9px">${cAcosD}</span></td>`;
        o+=`<td class="c">${cBurnD}</td>`;
        o+=`<td class="r" style="font-size:10px">${fN(cd.clicks)}</td>`;
        o+=`<td class="r" style="font-size:10px">${cCpc>0?'₹'+cCpc.toFixed(1):'—'}</td>`;
        o+=`<td class="r" style="font-size:10px">${cd.units||'—'}</td>`;
        o+=`<td class="c" style="font-size:9px;color:${cCvr>=10?'var(--green)':'var(--dim)'}">${cCvr>0?cCvr.toFixed(1)+'%':'—'}</td>`;
        o+=`<td colspan="2" style="font-size:9px;color:${sugC}">${suggest}</td>`;
        o+=`</tr>`;
      });
    } else if(isDrilled){
      o+=`<tr style="background:var(--card2)"><td colspan="15" style="padding-left:24px;font-size:10px;color:var(--dim)">No per-campaign data (SB keywords)</td></tr>`;
    }
    });
    if(!fTerms.length)o+=`<tr><td colspan="14" class="empty">No results</td></tr>`;
    o+=`</tbody></table></div></div>`;
  }

  // ── TAB: CAMPAIGNS ──
  if(S.tab==='campaigns'){
    // Classify campaigns by name: brand/generic/comp based on campaign naming convention
    allCamps.forEach(camp=>{
      const cn=camp.name.toLowerCase();
      if(cn.includes('/brand')||cn.includes('/br/')||cn.includes('brand'))camp.bgc='brand';
      else if(cn.includes('/comp')||cn.includes('/competitor')||cn.includes('comp'))camp.bgc='comp';
      else camp.bgc='generic';
    });
    o+=`<div class="ctrl" style="padding:6px 22px">`;
    [{id:'all',l:'All',t:'All campaigns'},
     {id:'bleeding',l:'Bleeding',t:'ACOS >90% or ∞, spend >₹500'},
     {id:'scale',l:'Scale',t:'ACOS ≤30%, sales >₹500'},
     {id:'optimize',l:'Optimize',t:'ACOS 50-90%'},
     {id:'burn',l:'Burn',t:'ACOS >200% or spend with zero sales'},
     {id:'wasted',l:'Wasted',t:'All bleeding keywords aggregated'}
    ].forEach(f=>{o+=`<button class="fbtn ${S.obj===f.id?'on':''}" onclick="setObj('${f.id}')" title="${f.t}">${f.l}</button>`;});
    o+=`<div class="sep"></div>`;
    // B/G/C filter for campaigns
    const campBgcCounts={brand:allCamps.filter(c=>c.bgc==='brand').length,generic:allCamps.filter(c=>c.bgc==='generic').length,comp:allCamps.filter(c=>c.bgc==='comp').length};
    o+=`<button class="fbtn ${S.termType==='all'?'on':''}" onclick="setType('all')">All</button>`;
    o+=`<button class="fbtn ${S.termType==='brand'?'brand-on':''}" onclick="setType('brand')">Brand (${campBgcCounts.brand})</button>`;
    o+=`<button class="fbtn ${S.termType==='generic'?'generic-on':''}" onclick="setType('generic')">Generic (${campBgcCounts.generic})</button>`;
    o+=`<button class="fbtn ${S.termType==='comp'?'comp-on':''}" onclick="setType('comp')">Comp (${campBgcCounts.comp})</button>`;
    o+=`<div class="sep"></div>`;
    o+=`<input class="sbox" placeholder="Search campaign..." oninput="setSearch(this.value)" value="${S.search}" style="width:200px">`;
    o+=`<span style="font-size:10px;color:var(--muted)">${allCamps.length} campaigns</span>`;
    o+=`</div>`;
    let filtCamps=allCamps;
    if(S.search){const q=S.search.toLowerCase();filtCamps=allCamps.filter(c=>c.name.toLowerCase().includes(q));}
    // B/G/C filter
    if(S.termType!=='all')filtCamps=filtCamps.filter(c=>c.bgc===S.termType);
    // Apply campaign filters
    if(S.obj==='bleeding')filtCamps=filtCamps.filter(c=>(isFinite(c.acos)&&c.acos>90&&c.spend>500)||(!isFinite(c.acos)&&c.spend>500));
    if(S.obj==='scale')filtCamps=filtCamps.filter(c=>isFinite(c.acos)&&c.acos>0&&c.acos<=30&&c.sales>500);
    if(S.obj==='optimize')filtCamps=filtCamps.filter(c=>isFinite(c.acos)&&c.acos>50&&c.acos<=90);
    if(S.obj==='burn')filtCamps=filtCamps.filter(c=>(c.spend>0&&c.sales===0)||(isFinite(c.acos)&&c.acos>200));
    if(S.obj==='wasted')filtCamps=filtCamps.filter(c=>(isFinite(c.acos)&&c.acos>90&&c.spend>500)||(!isFinite(c.acos)&&c.spend>500));
    o+=`<div class="sec"><div class="sec-title">Campaigns (${filtCamps.length}) — click to drill down</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th style="min-width:200px">CAMPAIGN</th>${S.brands.size!==1||isBrandAll()?'<th>BRAND</th>':''}<th class="c">TYPE</th><th class="r">SPEND</th><th class="r">SALES</th><th class="c">ACOS</th><th class="c">BURN</th><th class="r">CPC</th><th class="c">CVR%</th><th class="r">CLICKS</th><th class="r">UNITS</th><th class="r">BUDGET</th><th class="c">HEALTH</th></tr></thead><tbody>`;
    filtCamps.slice(0,50).forEach(c=>{
      const ad=isFinite(c.acos)?c.acos.toFixed(0)+'%':'∞';
      const cpc=c.clicks>0?(c.spend/c.clicks):0;
      const cvr=c.clicks>0?(c.units/c.clicks*100):0;
      let health='🟢',hc='var(--green)';
      if(isFinite(c.acos)&&c.acos>60||!isFinite(c.acos)){health='🔴';hc='var(--red)';}
      else if(isFinite(c.acos)&&c.acos>35){health='🟡';hc='var(--amber)';}
      o+=`<tr class="drill" onclick="drillCamp('${c.brand}','${c.name.replace(/'/g,"\\'")}')">`;
      o+=`<td><div class="kw">${c.name}</div></td>`;
      if(S.brands.size!==1||isBrandAll())o+=`<td style="font-size:9px;color:var(--muted)">${c.brand}</td>`;
      const atBadge=c.adType==='SD'?'<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(245,158,11,.12);color:var(--amber)">SD</span>':c.adType==='SB'?'<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(168,85,247,.12);color:var(--purple,#a855f7)">SB</span>':'<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,.12);color:var(--blue)">SP</span>';
      o+=`<td class="c">${atBadge}</td>`;
      o+=`<td class="r">${fmt(c.spend)}</td>`;
      o+=`<td class="r" style="color:var(--green)">${fmt(c.sales)}</td>`;
      o+=`<td class="c"><span class="pill" style="color:${acC(c.acos)}">${ad}</span></td>`;
      const cBurn=(c.spend>0&&c.sales===0)||(isFinite(c.acos)&&c.acos>200);
      o+=`<td class="c">${cBurn?'<span style="color:var(--red);font-size:9px">🔥'+fmt(c.spend)+'</span>':''}</td>`;
      o+=`<td class="r">₹${cpc.toFixed(1)}</td>`;
      o+=`<td class="c" style="font-family:var(--mono);font-size:10px;color:${cvr>=10?'var(--green)':cvr>=5?'var(--amber)':'var(--dim)'}">${cvr>0?cvr.toFixed(1)+'%':'—'}</td>`;
      o+=`<td class="r">${fN(c.clicks)}</td>`;
      o+=`<td class="r">${c.units||'—'}</td>`;
      o+=`<td class="r" style="color:var(--dim)">${c.budget?'₹'+fN(c.budget):'—'}</td>`;
      o+=`<td class="c">${health}</td>`;
      o+=`</tr>`;
    });
    o+=`</tbody></table></div></div>`;
  }

  } // end ads page else block

  document.getElementById('app').innerHTML=o;
  // Mount drill-down charts after DOM settles
  if(window._drillChartJob){
    const j=window._drillChartJob;
    window._drillChartJob=null;
    setTimeout(()=>{
      try{_mountDrillCharts(JSON.parse(j.cId),JSON.parse(j.labels),JSON.parse(j.units),JSON.parse(j.net),JSON.parse(j.spend),JSON.parse(j.tacos),JSON.parse(j.cvr),JSON.parse(j.acos));}
      catch(e){console.warn('drill chart mount',e);}
    },120);
  }
  setTimeout(()=>{
    if(S.tab==='overview'){
      // Build daily chart data from PRODUCT reports (allAsins.days)
      let days={};
      allAsins.forEach(a=>{Object.entries(a.days||{}).forEach(([dt,v])=>{if(!days[dt])days[dt]={spend:0,sales:0,clicks:0};days[dt].spend+=v.spend||0;days[dt].sales+=v.sales||0;days[dt].clicks+=v.clicks||0;});});
      // Fallback to daily_totals if product days empty
      if(!Object.keys(days).length){bds.forEach(bd=>{const fdt=filterDailyTotals(bd.daily_totals||{});Object.entries(fdt).forEach(([dt,v])=>{if(!days[dt])days[dt]={spend:0,sales:0,clicks:0};days[dt].spend+=v.spend||0;days[dt].sales+=v.sales||0;days[dt].clicks+=v.clicks||0;});});}
      if(!isDateAll()){const{start,end}=getDateRange();const fd={};Object.entries(days).forEach(([d,v])=>{if(d>=start&&d<=end)fd[d]=v;});days=fd;}
      const dates=Object.keys(days).sort();
      // Brand split pie — from product data per brand
      if(document.getElementById('c_split')){
        if(isBrandAll()&&getAllBD().length>1){
          const bsN=[],bsD=[],bsC=['#a78bfa','#22d3ee','#f59e0b','#10b981','#ef4444'];
          getAllBD().forEach(bd=>{const ba=processAsins([bd]);const sp=ba.reduce((s,a)=>s+a.spend,0);if(sp>0){bsN.push(bd.brand);bsD.push(sp);}});
          mkDoughnut('c_split',bsN,bsD,bsC.slice(0,bsN.length));
        } else {
          mkDoughnut('c_split',['Brand','Generic','Comp'],[typeSpend.brand,typeSpend.generic,typeSpend.comp],['#f59e0b','#3b82f6','#ef4444']);
        }
      }
      // CPC & CVR
      if(document.getElementById('c_cpc_cvr')){
        const cpcD=dates.map(d=>{const c=days[d]?.clicks||0;const s=days[d]?.spend||0;return c>0?(s/c):0;});
        mkLine('c_cpc_cvr',dates.map(d=>d.slice(5)),[{label:'CPC',data:cpcD,borderColor:'#22d3ee',backgroundColor:'#22d3ee11',fill:false,tension:.3,pointRadius:0,borderWidth:1.5,yAxisID:'y'}],v=>'₹'+v.toFixed(0));
      }
    }
    if(S.tab==='insights'){
      mkDoughnut('typePie',['Brand','Generic','Comp'],[typeSpend.brand,typeSpend.generic,typeSpend.comp],['#f59e0b','#3b82f6','#ef4444']);
    }
  },50);
  }catch(err){document.getElementById('app').innerHTML=`<div style="padding:40px;color:red;font-family:monospace"><h2>Render Error</h2><pre>${err.message}\n${err.stack}</pre></div>`;console.error(err);}
}

// ── Drilldown (campaign, adgroup, or ASIN) ──
function renderDrill(type,bds,rm){
  destroyCharts();const allTerms=processTerms(bds,rm);const allC=processCamps(bds);const allAsins=processAsins(bds);
  let title,sub,drillTerms,drillDays={},breadcrumb='';

  if(type==='campaign'){
    const cn=S.drillId;title='Campaign';sub=cn;breadcrumb=`${S.drillBrand}`;
    drillTerms=allTerms.filter(x=>x.campaignList.includes(cn));
    const cd=allC.find(c=>c.name===cn&&c.brand===S.drillBrand)||{};drillDays=cd.days||{};
  }else if(type==='adgroup'){
    const cn=S.drillId;const ag=S.drillAG;title='Ad Group';sub=ag;
    breadcrumb=`${S.drillBrand} › ${cn}`;
    // Filter search terms by campaign + adGroupName
    drillTerms=allTerms.filter(x=>x.campaignList.includes(cn)&&x.adGroup===ag);
    // Fallback: if adGroup matching returns nothing (aggregated data), show all campaign terms
    if(!drillTerms.length)drillTerms=allTerms.filter(x=>x.campaignList.includes(cn));
  }else{
    const asin=S.drillId;const ad=allAsins.find(a=>a.asin===asin)||{};title='ASIN';
    const imgUrl=`https://m.media-amazon.com/images/P/${asin}._SL75_.jpg`;
    const info=getAsinInfo(asin);
    sub=`<div class="prod-row"><img class="prod-img" src="${imgUrl}" onerror="this.style.display='none'" style="width:36px;height:36px"><div><a href="https://www.amazon.in/dp/${asin}" target="_blank" style="color:var(--blue);text-decoration:none">${asin}</a> • ${info.n||ad.sku||''} • ${info.c||''} • ${info.r||''}</div></div>`;
    const ac=getAsinCampaigns(bds,asin);drillTerms=allTerms.filter(x=>x.campaignList.some(c=>ac.has(c)));drillDays=ad.days||{};
  }
  // For ASIN drill, compute B/G/C from ALL terms before type filter
  const allDrillTerms=[...drillTerms];
  const tb={brand:0,generic:0,comp:0};allDrillTerms.forEach(x=>{tb[x.type]=(tb[x.type]||0)+x.spend});
  // Don't filter by type in drill - show all terms, use B/G/C badges to indicate
  drillTerms.sort((a,b)=>b.spend-a.spend);
  // For ASIN drill, use sp_products data for accurate KPIs
  let T=totals(drillTerms);
  if(type==='asin'){
    const ad=allAsins.find(a=>a.asin===S.drillId)||{};
    if(ad.spend>T.spend){T={spend:ad.spend,sales:ad.sales,clicks:ad.clicks||T.clicks,impr:ad.impr||T.impr,units:ad.units||T.units,acos:ad.acos,cpc:ad.clicks>0?(ad.spend/ad.clicks):T.cpc,cvr:ad.clicks>0?(ad.units/ad.clicks*100):T.cvr};}
  }

  let o=`<div class="hdr"><div class="hdr-row"><div class="logo">💰</div><div><h1>${title}</h1><div class="sub">${sub}</div></div></div></div>`;
  o+=`<div style="padding:10px 22px;display:flex;align-items:center;gap:12px">`;
  o+=`<div class="back-btn" onclick="goBack()">← Back</div>`;
  if(breadcrumb)o+=`<span style="font-size:10px;color:var(--dim)">${breadcrumb}</span>`;
  o+=`</div>`;
  o+=`<div class="sts" style="grid-template-columns:repeat(8,1fr)"><div class="st"><div class="lb">Spend</div><div class="vl" style="color:var(--amber)">${fmt(T.spend)}</div></div><div class="st"><div class="lb">Sales</div><div class="vl" style="color:var(--green)">${fmt(T.sales)}</div></div><div class="st"><div class="lb">ACOS</div><div class="vl" style="color:${acC(T.acos)}">${pct(T.acos)}</div></div><div class="st"><div class="lb">ROAS</div><div class="vl">${T.sales>0&&T.spend>0?(T.sales/T.spend).toFixed(2)+'x':'—'}</div></div><div class="st"><div class="lb">CPC</div><div class="vl" style="color:var(--cyan)">₹${T.cpc.toFixed(1)}</div></div><div class="st"><div class="lb">CVR</div><div class="vl">${pct(T.cvr)}</div></div><div class="st"><div class="lb">CAC</div><div class="vl" style="color:var(--purple)">₹${T.units>0?(T.spend/T.units).toFixed(0):'—'}</div></div><div class="st"><div class="lb">Keywords</div><div class="vl" style="color:var(--blue)">${drillTerms.length}</div></div></div>`;
  o+=`<div class="chart-row"><div class="chart-wrap"><div class="chart-label">Spend vs Sales</div><div style="height:160px"><canvas id="dc1"></canvas></div></div><div class="chart-wrap"><div class="chart-label">ACOS</div><div style="height:160px"><canvas id="dc2"></canvas></div></div></div>`;
  o+=`<div class="ctrl" style="padding:6px 22px"><span class="fbtn brand-on">Brand ${fmt(tb.brand)}</span><span class="fbtn generic-on">Generic ${fmt(tb.generic)}</span><span class="fbtn comp-on">Comp ${fmt(tb.comp)}</span></div>`;

  // ── Campaign drill: show Ad Groups table (clickable → Ad Group drill) ──
  if(type==='campaign'){
    const ags=getAdGroups(bds,S.drillId);
    if(ags.length){
      o+=`<div class="sec"><div class="sec-title">Ad Groups (${ags.length})</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>AD GROUP</th><th class="r">SPEND</th><th class="r">SALES</th><th class="c">ACOS</th><th class="r">CPC</th><th class="c">CVR%</th><th class="r">CLICKS</th><th class="r">UNITS</th><th class="r">IMPR</th><th class="c">ASINs</th></tr></thead><tbody>`;
      ags.forEach(ag=>{
        const cpc=ag.clicks>0?(ag.spend/ag.clicks):0;const cvr=ag.clicks>0?(ag.units/ag.clicks*100):0;
        const asinCount=(ag.asins||[]).length;
        o+=`<tr class="drill" onclick="drillAG('${ag.name.replace(/'/g,"\\'")}')">`;
        o+=`<td><div class="kw">${ag.name}</div></td>`;
        o+=`<td class="r">${fmt(ag.spend)}</td><td class="r" style="color:var(--green)">${fmt(ag.sales)}</td>`;
        o+=`<td class="c"><span class="pill" style="color:${acC(ag.acos)}">${isFinite(ag.acos)?ag.acos.toFixed(0)+'%':'∞'}</span></td>`;
        o+=`<td class="r">₹${cpc.toFixed(1)}</td>`;
        o+=`<td class="c" style="font-family:var(--mono);font-size:10px;color:${cvr>=10?'var(--green)':'var(--dim)'}">${cvr>0?cvr.toFixed(1)+'%':'—'}</td>`;
        o+=`<td class="r">${fN(ag.clicks)}</td><td class="r">${ag.units||'—'}</td><td class="r">${fN(ag.impr)}</td>`;
        o+=`<td class="c" style="font-size:10px;color:var(--purple)">${asinCount||'—'}</td>`;
        o+=`</tr>`;
      });
      o+=`</tbody></table></div></div>`;
    }
  }

  // ── Ad Group drill: show ASINs in this ad group ──
  if(type==='adgroup'){
    const agData=getAdGroups(bds,S.drillId).find(a=>a.name===S.drillAG);
    const agAsins=(agData?.asins||[]);
    if(agAsins.length){
      o+=`<div class="sec"><div class="sec-title">Ads / Products (${agAsins.length})</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th style="min-width:200px">PRODUCT</th><th class="c">CAT</th><th class="c">RANGE</th></tr></thead><tbody>`;
      agAsins.forEach(asin=>{
        const info=getAsinInfo(asin);const imgUrl=`https://m.media-amazon.com/images/P/${asin}._SL75_.jpg`;
        o+=`<tr class="drill" onclick="drillAsin('${asin}')"><td><div class="prod-row"><img class="prod-img" src="${imgUrl}" onerror="this.style.display='none'" loading="lazy"><div class="prod-info"><div class="prod-sku">${info.n||asin}</div><div class="prod-asin"><a href="https://www.amazon.in/dp/${asin}" target="_blank" style="color:var(--blue);text-decoration:none" onclick="event.stopPropagation()">${asin} ↗</a></div></div></div></td>`;
        o+=`<td class="c">${info.c?`<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(167,139,250,.1);color:var(--purple)">${info.c}</span>`:''}</td>`;
        o+=`<td class="c">${info.r?`<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(34,211,238,.08);color:var(--cyan)">${info.r}</span>`:''}</td>`;
        o+=`</tr>`;
      });
      o+=`</tbody></table></div></div>`;
    }
  }

  // ── ASIN drill: Organic Rankings + Campaigns ──
  if(type==='asin'){
    const asin=S.drillId;const orgD=S.rank.filter(r=>{const f=r.family_asins||'';return r.asin===asin||f.includes(asin)});const ld=orgD.length?[...new Set(orgD.map(d=>d.date))].sort().pop():'';const ok=orgD.filter(d=>d.date===ld);
    if(ok.length){o+=`<div class="sec"><div class="sec-title">Organic Rankings</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>KEYWORD</th><th class="c">RANK</th><th class="c">SP</th></tr></thead><tbody>`;ok.sort((a,b)=>(a.organic_rank||999)-(b.organic_rank||999)).forEach(r=>{let rk='—';if(r.organic_rank)rk=`<span class="pill" style="background:${rkBg(r.organic_rank)};color:${rkC(r.organic_rank)}">#${r.organic_rank}</span>`;const sp=r.our_sponsored_position?`<span class="pill" style="color:var(--purple)">#${r.our_sponsored_position}</span>`:'—';o+=`<tr><td>${r.keyword}</td><td class="c">${rk}</td><td class="c">${sp}</td></tr>`;});o+=`</tbody></table></div></div>`;}
    const ac=getAsinCampaigns(bds,asin);
    o+=`<div class="sec"><div class="sec-title">Campaigns (${ac.size})</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>CAMPAIGN</th><th class="r">SPEND</th><th class="r">SALES</th><th class="c">ACOS</th></tr></thead><tbody>`;
    [...ac].forEach(cn=>{const c=allC.find(x=>x.name===cn);if(!c)return;o+=`<tr class="drill" onclick="drillCamp('${c.brand}','${cn.replace(/'/g,"\\'")}')"><td><div class="kw">${cn}</div></td><td class="r">${fmt(c.spend)}</td><td class="r" style="color:var(--green)">${fmt(c.sales)}</td><td class="c"><span class="pill" style="color:${acC(c.acos)}">${isFinite(c.acos)?c.acos.toFixed(0)+'%':'∞'}</span></td></tr>`;});
    o+=`</tbody></table></div></div>`;
  }

  // Search Terms (all drill types)
  o+=`<div class="sec"><div class="sec-title">Search Terms (${drillTerms.length})</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>KEYWORD</th><th class="c">TYPE</th><th class="c">ORG</th><th class="r">SPEND</th><th class="r">SALES</th><th class="c">ACOS</th><th class="r">CLICKS</th><th class="r">UNITS</th><th class="c">CVR</th><th class="c">MATCH</th><th>CAMPAIGN</th></tr></thead><tbody>`;

function buildRangeData(){
  if(!S.sales||!S.sales.brands)return{ranges:[],skus:[],categories:[],brands:[],sortedMonths:[],years:[],monthNames:[]};
  var dayFrom=rangeState.dayFrom||1,dayTo=rangeState.dayTo||31;
  var hasDayFilter=dayFrom>1||dayTo<31;
  var allDates=[];
  Object.values(S.sales.brands).forEach(function(bd){Object.keys(bd.daily||{}).forEach(function(d){allDates.push(d)})});
  allDates.sort();
  if(!allDates.length)return{ranges:[],skus:[],categories:[],brands:[],sortedMonths:[],years:[],monthNames:[]};
  var monthSet=new Set(allDates.map(function(d){return d.slice(0,7)}));
  var sortedMonths=[...monthSet].sort();
  // Filter to Jan 2025 onwards
  sortedMonths=sortedMonths.filter(function(m){return m>='2025-01'});
  // Count actual days per month WITHIN the day range filter
  var actualDays={};
  sortedMonths.forEach(function(m){
    var dateSet=new Set(allDates.filter(function(d){
      if(!d.startsWith(m))return false;
      if(hasDayFilter){var dom=parseInt(d.slice(8,10));return dom>=dayFrom&&dom<=dayTo;}
      return true;
    }));

  var years=[...new Set(sortedMonths.map(function(m){return m.slice(0,4)}))].sort();

  // Helper: does a date pass the day-of-month filter?
  function dayOk(d){
    if(!hasDayFilter)return true;
    var dom=parseInt(d.slice(8,10));

  }

  var adsMap={};
  var adsMonthlyMap={};

      if(hasDayFilter){
        Object.entries(p.days||{}).forEach(function([d,v]){
          if(!dayOk(d))return;
          adsMap[p.asin].spend+=v.spend||0;
          adsMap[p.asin].sales+=v.sales||0;
          var m=d.slice(0,7);
          if(!adsMonthlyMap[p.asin][m])adsMonthlyMap[p.asin][m]={spend:0,sales:0};
          adsMonthlyMap[p.asin][m].spend+=v.spend||0;
          adsMonthlyMap[p.asin][m].sales+=v.sales||0;
        });
      } else {
        adsMap[p.asin].spend+=(p.spend||p.sp_spend||0)+(p.sd_spend||0);
        adsMap[p.asin].sales+=(p.sales||p.sp_sales||0)+(p.sd_sales||0);
        Object.entries(p.days||{}).forEach(function([d,v]){
          var m=d.slice(0,7);
          if(!adsMonthlyMap[p.asin][m])adsMonthlyMap[p.asin][m]={spend:0,sales:0};
          adsMonthlyMap[p.asin][m].spend+=v.spend||0;
          adsMonthlyMap[p.asin][m].sales+=v.sales||0;
        });
      }
    });
  });

  var catAgg={},rngAgg={},skus=[],brandSet=new Set(),catSet=new Set();
  // Build brand-level monthly MRP/Gross from brand daily data (for correct disc%)
  var brandMonthlyMrp={};
  Object.entries(S.sales.brands).forEach(function([brandName,bd]){
    brandMonthlyMrp[brandName]={};
    Object.entries(bd.daily||{}).forEach(function([d,v]){

      if(!brandMonthlyMrp[brandName][m])brandMonthlyMrp[brandName][m]={mrp:0,gross:0};
      brandMonthlyMrp[brandName][m].mrp+=v.mrp||0;
      brandMonthlyMrp[brandName][m].gross+=v.gross||0;

  });
  Object.entries(S.sales.brands).forEach(function([brandName,bd]){
    brandSet.add(brandName);
    (bd.asins||[]).forEach(function(a){
      var cat=a.category||'-';
      if(cat==='-'&&(a.net||0)<1000)return;
      catSet.add(cat);
      var key=brandName+'|||'+cat;
      if(!catAgg[key])catAgg[key]={brand:brandName,category:cat,net:0,units:0,ad_spend:0,ad_sales:0,monthly:{},asin_count:0};
      catAgg[key].asin_count++;

      // Range aggregation using ASIN_MAP
      var asinInfo=getAsinInfo(a.asin);
      var rng=asinInfo.r||'-';
      var rngKey=brandName+'|||'+rng;
      if(!rngAgg[rngKey])rngAgg[rngKey]={brand:brandName,category:rng,net:0,units:0,ad_spend:0,ad_sales:0,monthly:{},asin_count:0};
      rngAgg[rngKey].asin_count++;

      // Compute totals from daily data respecting day filter
      var asinNet=0,asinUnits=0;
      var skuMonthly=[];
      sortedMonths.forEach(function(m){
        if(!catAgg[key].monthly[m])catAgg[key].monthly[m]={net:0,units:0,ad_spend:0,ad_sales:0,mrp:0,gross:0};
        if(!rngAgg[rngKey].monthly[m])rngAgg[rngKey].monthly[m]={net:0,units:0,ad_spend:0,ad_sales:0,mrp:0,gross:0};
        var mnet=0,munits=0,mmrp=0,mgross=0;
        Object.entries(a.daily||{}).forEach(function([d,v]){
          if(!d.startsWith(m))return;
          if(!dayOk(d))return;
          mnet+=v.net||0;munits+=v.units||0;mmrp+=v.ordered||v.mrp||0;mgross+=v.gross||0;
        });
        catAgg[key].monthly[m].net+=mnet;catAgg[key].monthly[m].units+=munits;
        catAgg[key].monthly[m].mrp+=mmrp;catAgg[key].monthly[m].gross+=mgross;
        rngAgg[rngKey].monthly[m].net+=mnet;rngAgg[rngKey].monthly[m].units+=munits;
        rngAgg[rngKey].monthly[m].mrp+=mmrp;rngAgg[rngKey].monthly[m].gross+=mgross;
        var mAd=adsMonthlyMap[a.asin]&&adsMonthlyMap[a.asin][m]?adsMonthlyMap[a.asin][m]:{spend:0,sales:0};
        catAgg[key].monthly[m].ad_spend+=mAd.spend;catAgg[key].monthly[m].ad_sales+=mAd.sales;
        rngAgg[rngKey].monthly[m].ad_spend+=mAd.spend;rngAgg[rngKey].monthly[m].ad_sales+=mAd.sales;
        var days=actualDays[m]||1;
        var masp=munits>0?Math.round(mnet/munits):0;
        var bMrpSku=brandMonthlyMrp[brandName]&&brandMonthlyMrp[brandName][m];
        var mdisc=bMrpSku&&bMrpSku.mrp>0?+((1-bMrpSku.gross/bMrpSku.mrp)*100).toFixed(1):0;
        skuMonthly.push({month:m,m:m.slice(5),net:Math.round(mnet),units:munits,mrp:Math.round(mmrp),gross:Math.round(mgross),
          drr:days>0?Math.round(mnet/days):0,drr_units:days>0?Math.round(munits/days):0,
          asp:masp,disc:mdisc,
          ad_spend:Math.round(mAd.spend),ad_sales:Math.round(mAd.sales)});
        asinNet+=mnet;asinUnits+=munits;
      });

      var ad=hasDayFilter?(adsMap[a.asin]||{spend:0,sales:0}):(adsMap[a.asin]||{spend:0,sales:0});
      catAgg[key].net+=asinNet;catAgg[key].units+=asinUnits;
      catAgg[key].ad_spend+=ad.spend;catAgg[key].ad_sales+=ad.sales;
      rngAgg[rngKey].net+=asinNet;rngAgg[rngKey].units+=asinUnits;
      rngAgg[rngKey].ad_spend+=ad.spend;rngAgg[rngKey].ad_sales+=ad.sales;

      var skuAdsNet=skuMonthly.reduce(function(ss,mm){return mm.ad_spend>0?ss+mm.net:ss},0);var tacos=skuAdsNet>0?(ad.spend/skuAdsNet*100):0;
      var acos=ad.sales>0?(ad.spend/ad.sales*100):0;
      var orgPct=asinNet>0?((asinNet-ad.sales)/asinNet*100):0;
      var latestDrr=skuMonthly.length?skuMonthly[skuMonthly.length-1].drr:0;
      var prevDrr=skuMonthly.length>1?skuMonthly[skuMonthly.length-2].drr:0;
      var firstDrr=skuMonthly.length?skuMonthly[0].drr:0;
      var drrTrend=prevDrr>0?((latestDrr-prevDrr)/prevDrr*100):(latestDrr>0?100:0);
      // MoM for latest
      var momDrr=prevDrr>0?((latestDrr-prevDrr)/prevDrr*100):0;

      var asinInfo=getAsinInfo(a.asin);
      var skuRange=asinInfo.r||'';

      skus.push({asin:a.asin,sku:a.sku||'',name:(a.title||a.asin).slice(0,50),brand:brandName,
        category:cat,range:skuRange,net:Math.round(asinNet),units:asinUnits,
        ad_spend:Math.round(ad.spend),ad_sales:Math.round(ad.sales),
        tacos:+(tacos.toFixed(1)),acos:+(acos.toFixed(1)),org_pct:+(orgPct.toFixed(1)),
        latest_drr:latestDrr,prev_drr:prevDrr,first_drr:firstDrr,
        drr_trend:+(drrTrend.toFixed(1)),mom_drr:+(momDrr.toFixed(1)),monthly:skuMonthly});
    });
  });

  // Collect unique ranges
  var rangeSet=new Set();skus.forEach(function(s){if(s.range&&s.range!=='0'&&s.range!=='nan')rangeSet.add(s.range);});

  var ranges=Object.values(catAgg).map(function(r){
    var adsNet=0;Object.values(r.monthly).forEach(function(mm){if(mm.ad_spend>0)adsNet+=mm.net;});var tacos=adsNet>0?(r.ad_spend/adsNet*100):0;
    var acos=r.ad_sales>0?(r.ad_spend/r.ad_sales*100):0;
    var organic=r.net-r.ad_sales;var orgPct=r.net>0?(organic/r.net*100):0;
    var mArr=sortedMonths.map(function(m){
      var d=r.monthly[m]||{net:0,units:0,ad_spend:0,ad_sales:0};

      var mAsp=d.units>0?Math.round(d.net/d.units):0;var bMrpM=brandMonthlyMrp[r.brand]&&brandMonthlyMrp[r.brand][m];var mDisc=bMrpM&&bMrpM.mrp>0?+((1-bMrpM.gross/bMrpM.mrp)*100).toFixed(1):0;return{month:m,net:d.net,units:d.units,mrp:d.mrp||0,gross:d.gross||0,asp:mAsp,disc:mDisc,drr:days>0?Math.round(d.net/days):0,drr_units:days>0?Math.round(d.units/days):0,
        ad_spend:d.ad_spend,ad_sales:d.ad_sales,tacos:+(mTacos.toFixed(1)),acos:+(mAcos.toFixed(1))};
    });
    var latestDrr=mArr.length?mArr[mArr.length-1].drr:0;

      monthlyArr:mArr,latest_drr:latestDrr,prev_drr:prevDrr,first_drr:firstDrr,drr_trend:+(trend.toFixed(1))});
  }).filter(function(r){return r.net>5000}).sort(function(a,b){return b.net-a.net});

  // Build range-level aggregates (same structure as ranges but grouped by range)
  var rangeRanges=Object.values(rngAgg).map(function(r){
    var adsNet=0;Object.values(r.monthly).forEach(function(mm){if(mm.ad_spend>0)adsNet+=mm.net;});var tacos=adsNet>0?(r.ad_spend/adsNet*100):0;
    var acos=r.ad_sales>0?(r.ad_spend/r.ad_sales*100):0;
    var organic=r.net-r.ad_sales;var orgPct=r.net>0?(organic/r.net*100):0;
    var mArr=sortedMonths.map(function(m){
      var d=r.monthly[m]||{net:0,units:0,ad_spend:0,ad_sales:0};

      var mAsp=d.units>0?Math.round(d.net/d.units):0;var bMrpM=brandMonthlyMrp[r.brand]&&brandMonthlyMrp[r.brand][m];var mDisc=bMrpM&&bMrpM.mrp>0?+((1-bMrpM.gross/bMrpM.mrp)*100).toFixed(1):0;return{month:m,net:d.net,units:d.units,mrp:d.mrp||0,gross:d.gross||0,asp:mAsp,disc:mDisc,drr:days>0?Math.round(d.net/days):0,drr_units:days>0?Math.round(d.units/days):0,
        ad_spend:d.ad_spend,ad_sales:d.ad_sales,tacos:+(mTacos.toFixed(1)),acos:+(mAcos.toFixed(1))};

}

function riFmt(n){if(n==null||isNaN(n))return'—';if(Math.abs(n)>=10000000)return'\u20b9'+(n/10000000).toFixed(1)+'Cr';if(Math.abs(n)>=100000)return'\u20b9'+(n/100000).toFixed(1)+'L';if(Math.abs(n)>=1000)return'\u20b9'+(n/1000).toFixed(0)+'K';return'\u20b9'+Math.round(n)}

// SFR data helpers — maps sfr_data.json families/keywords via ASIN_MAP
function getSfrMap(){
  if(!S.sfr)return{byCat:{},byAsin:{},keywords:[]};
  var byAsin={};
  var brandFull={'BA':'Bare Anatomy','CAP':'Chemist at Play','SS':'Sunscoop'};
  // Step 1: Map each ASIN from families to its SFR data
  // families have: main_asin (string), asins[] (may be empty), avg_sfr, avg_org_rank, tracked_kws, ranked_kws
  (S.sfr.families||[]).forEach(function(f){

    var rankedKws=f.ranked_kws||0;
    // Demand: if more ranked keywords than not, demand is up
    var dUp=rankedKws>0?rankedKws:0;
    var dDown=kwCount>rankedKws?kwCount-rankedKws:0;
    var sfrEntry={sfr:sfr,orgRank:orgRank,demandUp:dUp,demandDown:dDown,kwCount:kwCount};
    // Use asins array if available, otherwise main_asin
    var asinList=(f.asins&&f.asins.length)?f.asins:[];
    if(!asinList.length&&f.main_asin)asinList=[f.main_asin];
    asinList.forEach(function(a){
      if(a)byAsin[a.toUpperCase()]=sfrEntry;
    });
  });

  // Step 2: Aggregate to category level using ASIN_MAP (getAsinInfo)
  var byCat={};
  Object.keys(byAsin).forEach(function(asin){
    var info=getAsinInfo(asin);
    if(!info.c)return;
    var brand=brandFull[info.b]||info.b||'';var cat=info.c||'-';
    var key=brand+'|||'+cat;
    var s=byAsin[asin];
    if(!byCat[key])byCat[key]={sfrSum:0,demandUp:0,demandDown:0,count:0};
    byCat[key].sfrSum+=s.sfr;byCat[key].demandUp+=s.demandUp;byCat[key].demandDown+=s.demandDown;byCat[key].count++;
  });
  // Average
  Object.keys(byCat).forEach(function(k){
    var c=byCat[k];
    c.sfr=c.count>0?Math.round(c.sfrSum/c.count):0;
  });

  // Step 3: Also aggregate by range using ASIN_MAP
  var byRange={};
  Object.keys(byAsin).forEach(function(asin){
    var info=getAsinInfo(asin);
    if(!info.r)return;
    var brand=brandFull[info.b]||info.b||'';var rng=info.r||'-';
    var key=brand+'|||'+rng;
    var s=byAsin[asin];
    if(!byRange[key])byRange[key]={sfrSum:0,demandUp:0,demandDown:0,count:0};
    byRange[key].sfrSum+=s.sfr;byRange[key].demandUp+=s.demandUp;byRange[key].demandDown+=s.demandDown;byRange[key].count++;
  });
  Object.keys(byRange).forEach(function(k){
    var c=byRange[k];
    c.sfr=c.count>0?Math.round(c.sfrSum/c.count):0;
  });

  return{byCat:byCat,byRange:byRange,byAsin:byAsin,keywords:S.sfr.keywords||[]};
}

          var v=isUnits?(mo.drr_units||0):isAsp?(mo.asp||0):isDisc?(mo.disc||0):isTacos?(mo.net>0&&mo.ad_spend>0?+((mo.ad_spend/mo.net)*100).toFixed(1):0):mo.drr;
          mTotal+=parseFloat(v)||0;
        }
      });
      if(isAsp&&filteredDrillSkus.length>0){
        // ASP should be weighted average not sum
        var tN=0,tU=0;
        filteredDrillSkus.forEach(function(s){var mo=s.monthly.find(function(x){return x.month===m});if(mo){tN+=mo.net||0;tU+=mo.units||0;}});
        mTotal=tU>0?Math.round(tN/tU):0;
      }
      var fmt=isDisc||isTacos?(mTotal>0?mTotal.toFixed(1)+'%':'—'):isAsp?(mTotal>0?'₹'+mTotal:'—'):(isUnits?fN(Math.round(mTotal)):riFmt(Math.round(mTotal)));
      h+='<td class="r" style="font-size:9px;font-weight:600">'+fmt+'</td>';
    });
    h+='<td class="c">—</td></tr>';

    filteredDrillSkus.forEach(function(s){
      // Compute values from visible months only
      var sNet=0,sSpend=0,sAdSales=0,sUnits=0,sNetAds=0;
      s.monthly.forEach(function(m){
        if(visibleMonths.indexOf(m.month)===-1)return;
        sNet+=m.net||0;sUnits+=m.units||0;sSpend+=m.ad_spend||0;sAdSales+=m.ad_sales||0;
        if(m.ad_spend>0)sNetAds+=m.net||0;
      });
      var sTacos=sNetAds>0?(sSpend/sNetAds*100):0;
      var sAcos=sAdSales>0?(sSpend/sAdSales*100):0;
      var sOrgPct=sNet>0?((sNet-sAdSales)/sNet*100):0;
      // Compute comparison
      var skuMomVal=s.mom_drr;
      if(hasComp){
        var smaA=s.monthly.find(function(x){return x.month===cmpA});
        var smaB=s.monthly.find(function(x){return x.month===cmpB});
        var sdA=smaA?smaA.drr:0,sdB=smaB?smaB.drr:0;
        skuMomVal=sdA>0?((sdB-sdA)/sdA*100):(sdB>0?100:0);
      }
      var sig=riSkuSig(Object.assign({},s,{mom_drr:skuMomVal})),sigL=sig[0],sc=sig[1];
      var share=stNet>0?(sNet/stNet*100):0;
      var momC=skuMomVal>=0?'var(--green)':'var(--red)';
      h+='<tr onclick="rangeState.selSku=\''+s.asin+'\';render()" class="drill">';
      h+='<td><img src="'+getAsinImg(s.asin)+'" onerror="this.style.display=\'none\'" style="width:28px;height:28px;border-radius:4px;background:var(--card2)" loading="lazy"></td>';
      h+='<td><div style="font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s.name+'</div><div style="font-size:8px;font-family:var(--mono);color:var(--muted)">'+s.asin+'</div></td>';
      h+='<td style="font-family:var(--mono);font-size:10px;color:var(--cyan);white-space:nowrap">'+(s.sku||'\u2014')+'</td>';
      h+='<td class="r" style="font-weight:600;color:var(--green)">'+riFmt(sNet)+'</td>';
      // Share bar
      h+='<td class="c"><div style="display:flex;align-items:center;gap:4px;justify-content:center"><div style="width:40px;height:6px;border-radius:3px;background:var(--card2);overflow:hidden"><div style="width:'+Math.min(100,share)+'%;height:100%;background:var(--blue);border-radius:3px"></div></div><span style="font-size:9px;font-family:var(--mono)">'+share.toFixed(1)+'%</span></div></td>';
      h+='<td class="r" style="color:var(--amber)">'+riFmt(sSpend)+'</td>';
      h+='<td class="c" style="color:'+(sTacos>20?'var(--red)':sTacos<12?'var(--green)':'var(--amber)')+'"><b>'+sTacos.toFixed(1)+'%</b></td>';
      h+='<td class="c" style="color:'+(sAcos>40?'var(--red)':'var(--muted)')+'">'+sAcos.toFixed(1)+'%</td>';
      h+='<td class="r" style="color:'+(sOrgPct>60?'var(--green)':'var(--muted)')+'">'+sOrgPct.toFixed(0)+'%</td>';
      // SFR for this ASIN
      var skuSfr=sfrMap.byAsin[s.asin];
      h+='<td class="c">'+(skuSfr?sfrBadge(skuSfr.sfr):'<span style="color:var(--dim);font-size:9px">—</span>')+'</td>';
      h+='<td class="r" style="font-weight:600">'+riFmt(s.latest_drr)+'</td>';
      h+='<td class="c" style="color:'+momC+';font-weight:600">'+riPct(skuMomVal)+'</td>';
      // Last 6 months DRR
      s.monthly.slice(-6).forEach(function(m){
        if(visibleMonths.indexOf(m.month)===-1)return;
        var isCmp=hasComp&&(m.month===cmpA||m.month===cmpB);
        var drrV=isUnits?(m.drr_units||0):isAsp?(m.asp||0):isDisc?(m.disc||0):isTacos?(m.net>0&&m.ad_spend>0?+((m.ad_spend/m.net)*100).toFixed(1):0):m.drr;
        var drrF=isDisc?(drrV>0?drrV.toFixed(1)+'%':'—'):isTacos?(drrV>0?drrV.toFixed(1)+'%':'—'):isAsp?(drrV>0?'₹'+drrV:'—'):(isUnits?fN(drrV):riFmt(drrV));
        h+='<td class="r" style="font-size:9px;'+(isCmp?'background:rgba(167,139,250,.08);font-weight:600':'')+'">'+drrF+'</td>';
      });
      // Action signal
      h+='<td class="c"><span class="pill" style="color:'+sc+';background:'+sc+'15;border:1px solid '+sc+'33;font-size:8px">'+sigL+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  }

  document.getElementById('app').innerHTML=h;

  // ── CHARTS — mounted after DOM update ──
  setTimeout(function(){
    var yFmt=function(v){return v>=100000?'\u20b9'+(v/100000).toFixed(1)+'L':v>=1000?'\u20b9'+(v/1000)+'K':'\u20b9'+v};
    var chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7280',font:{size:9},padding:6}}},
      scales:{x:{ticks:{color:'#6b7280',font:{size:8},maxRotation:45},grid:{display:false}},y:{beginAtZero:true,ticks:{color:'#3a3a44',font:{size:9},callback:yFmt},grid:{color:'#1c1c25'}}}};

    // Monthly DRR bar chart — scoped to drilled range/category if in drill-down
    if(document.getElementById('ri-drr-bar')){
      var chartRanges=filtRanges;
      if(cd){
        var cdP=cd.split('|||');
        // Search in the full baseRanges (not filtRanges which may be pre-filtered)
        chartRanges=baseRanges.filter(function(r){return r.brand===cdP[0]&&r.category===cdP[1]});
        if(!chartRanges.length)chartRanges=[filtRanges.find(function(r){return r.brand===cdP[0]&&r.category===cdP[1]})].filter(Boolean);
        if(!chartRanges.length)chartRanges=filtRanges; // ultimate fallback
      }
      var barLabels=visibleMonths.map(function(m){return monthLabel(m)});
      var barData=visibleMonths.map(function(m){
        if(isAsp||isDisc||isTacos){
          var tNet=0,tUnits=0,tMrp=0,tGross=0,tAdSpend=0;
          chartRanges.forEach(function(r){
            var ma=r.monthlyArr.find(function(x){return x.month===m});
            if(ma){tNet+=ma.net||0;tUnits+=ma.units||0;tAdSpend+=ma.ad_spend||0;}
          });
          if(isAsp)return tUnits>0?Math.round(tNet/tUnits):0;
          if(isTacos)return tNet>0?+((tAdSpend/tNet)*100).toFixed(1):0;
          // Disc%: use brand-level MRP/Gross
          var bMrpTotal=0,bGrossTotal=0;
          var bNames=cd?[cd.split('|||')[0]]:(sb==='ALL'?Object.keys(brandMonthlyMrp):[sb]);
          bNames.forEach(function(bn){var bm=brandMonthlyMrp[bn]&&brandMonthlyMrp[bn][m];if(bm){bMrpTotal+=bm.mrp||0;bGrossTotal+=bm.gross||0;}});
          return bMrpTotal>0?+((1-bGrossTotal/bMrpTotal)*100).toFixed(1):0;
        }
        var total=0;
        chartRanges.forEach(function(r){
          var ma=r.monthlyArr.find(function(x){return x.month===m});
          if(ma)total+=isUnits?(ma.drr_units||0):ma.drr;
        });
        return total;
      });
      var barColors=barData.map(function(v,i){var last=i===barData.length-1;return last?(isTacos?'rgba(245,158,11,.9)':isDisc?'rgba(239,68,68,.9)':isAsp?'rgba(34,211,238,.9)':'rgba(59,130,246,.9)'):(isTacos?'rgba(245,158,11,.5)':isDisc?'rgba(239,68,68,.5)':isAsp?'rgba(34,211,238,.5)':'rgba(59,130,246,.5)')});
      var barYFmt=isDisc||isTacos?function(v){return v.toFixed(0)+'%'}:isAsp?function(v){return'₹'+v}:isUnits?function(v){return v>=1000?(v/1000).toFixed(0)+'K':v}:yFmt;
      var barLabelFmt=isDisc||isTacos?function(v){return v.toFixed(1)+'%'}:isAsp?function(v){return'₹'+v}:isUnits?function(v){return v>=1000?(v/1000).toFixed(0)+'K':v}:function(v){return v>=100000?'\u20b9'+(v/100000).toFixed(1)+'L':v>=1000?'\u20b9'+(v/1000).toFixed(0)+'K':'\u20b9'+v};
      var barLabel=isUnits?'DRR Units/day':isAsp?'ASP ₹':isDisc?'Discount %':isTacos?'TACOS %':'DRR ₹/day';
      // Plugin: data labels on top of bars
      var barLabelPlugin={id:'barLabels',afterDatasetsDraw:function(chart){
        var ctx=chart.ctx;var meta=chart.getDatasetMeta(0);
        ctx.save();ctx.fillStyle='#9ca3af';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
        meta.data.forEach(function(bar,i){
          var val=chart.data.datasets[0].data[i];
          if(val===0||val===null)return;
          ctx.fillText(barLabelFmt(val),bar.x,bar.y-4);
        });
        ctx.restore();
      }};
      var barChartOpts={responsive:true,maintainAspectRatio:false,
        layout:{padding:{top:20}},
        plugins:{legend:{labels:{color:'#6b7280',font:{size:9},padding:6}}},
        scales:{x:{ticks:{color:'#6b7280',font:{size:8},maxRotation:45},grid:{display:false}},y:{beginAtZero:!isDisc,ticks:{color:'#3a3a44',font:{size:9},callback:barYFmt},grid:{color:'#1c1c25'}}}};
      charts['ri-drr-bar']=new Chart(document.getElementById('ri-drr-bar'),{type:'bar',plugins:[barLabelPlugin],data:{labels:barLabels,datasets:[
        {label:barLabel,data:barData,backgroundColor:barColors,borderColor:isTacos?'#f59e0b':isDisc?'#ef4444':isAsp?'#22d3ee':'#3b82f6',borderWidth:1,borderRadius:4}
      ]},options:barChartOpts});
    }

    // Category pie chart with % labels
    if(document.getElementById('ri-cat-pie')){
      var pieMode=rangeState.pieMode||'cat';
      var pieItems,pieTotalNet,pieLabels,pieData;

      if(pieMode==='range'){
        // Group by range from SKUs
        var rangeAgg={};
        filtSkus.forEach(function(s){
          var rng=s.range||'Unknown';
          if(!rangeAgg[rng])rangeAgg[rng]={net:0,label:rng};
          rangeAgg[rng].net+=s.net;
        });
        pieItems=Object.values(rangeAgg).sort(function(a,b){return b.net-a.net}).slice(0,10);
        pieTotalNet=pieItems.reduce(function(s,x){return s+x.net},0);
        pieLabels=pieItems.map(function(x){var pct=pieTotalNet>0?(x.net/pieTotalNet*100):0;return x.label+' '+pct.toFixed(1)+'%';});
        pieData=pieItems.map(function(x){return x.net});
      } else {
        var topCats=filtRanges.slice(0,10);
        pieTotalNet=topCats.reduce(function(s,r){return s+r.net},0);
        pieLabels=topCats.map(function(r){
          var pct=pieTotalNet>0?(r.net/pieTotalNet*100):0;
          return(sb==='ALL'?riBrandShort(r.brand)+' ':'')+r.category+' '+pct.toFixed(1)+'%';
        });
        pieData=topCats.map(function(r){return r.net});
      }

      var pieColors=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ec4899','#22d3ee','#6366f1','#f97316','#a78bfa','#84cc16'];
      // Custom plugin to draw % on slices
      var pctPlugin={id:'pctLabels',afterDraw:function(chart){
        var ctx=chart.ctx;var meta=chart.getDatasetMeta(0);var total=chart.data.datasets[0].data.reduce(function(a,b){return a+b},0);
        if(!total)return;
        meta.data.forEach(function(el,i){
          var val=chart.data.datasets[0].data[i];var pct=(val/total*100);
          if(pct<3)return; // skip tiny slices
          var pos=el.tooltipPosition();
          ctx.save();ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(pct.toFixed(0)+'%',pos.x,pos.y);ctx.restore();
        });
      }};
      charts['ri-cat-pie']=new Chart(document.getElementById('ri-cat-pie'),{type:'doughnut',data:{labels:pieLabels,datasets:[
        {data:pieData,backgroundColor:pieColors.slice(0,pieLabels.length),borderWidth:0}
      ]},plugins:[pctPlugin],options:{responsive:true,maintainAspectRatio:false,cutout:'45%',plugins:{
        legend:{position:'right',labels:{color:'#6b7280',font:{size:9},padding:5,usePointStyle:true,pointStyleWidth:8}},
        tooltip:{callbacks:{label:function(ctx){var total=ctx.dataset.data.reduce(function(a,b){return a+b},0);var pct=total>0?(ctx.raw/total*100).toFixed(1)+'%':'';return ctx.label+': '+riFmt(ctx.raw)+' ('+pct+')';}}}
      }}});
    }

    // Category drill-down SKU chart
    if(cd&&document.getElementById('ri-cat-sku-chart')){
      var cdParts2=cd.split('|||');var cdBrand2=cdParts2[0],cdCat2=cdParts2[1];
      var cSkus=skus.filter(function(s){
        return s.brand===cdBrand2&&(isRangeMode?s.range===cdCat2:s.category===cdCat2);
      }).sort(function(a,b){return b.net-a.net}).slice(0,10);
      var skuColors=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ec4899','#22d3ee','#6366f1','#f97316','#a78bfa','#84cc16'];
      var skuDS=cSkus.map(function(s,si){
        return{label:(s.sku||s.asin).slice(0,15),data:visibleMonths.map(function(m){
          var mo=s.monthly.find(function(x){return x.month===m});return mo?mo.drr:0;
        }),borderColor:skuColors[si%skuColors.length],backgroundColor:'transparent',pointRadius:2,tension:.3,borderWidth:1.5};
      });
      charts['ri-cat-sku']=new Chart(document.getElementById('ri-cat-sku-chart'),{type:'line',data:{
        labels:visibleMonths.map(function(m){return monthLabel(m)}),datasets:skuDS
      },options:chartOpts});

    // Contribution pie
    if(cd&&document.getElementById('ri-sku-contrib')){
      var cdParts3=cd.split('|||');var cdBrand3=cdParts3[0],cdCat3=cdParts3[1];
      var cSkus2=skus.filter(function(s){
        return s.brand===cdBrand3&&(isRangeMode?s.range===cdCat3:s.category===cdCat3);
      }).sort(function(a,b){return b.net-a.net});
      var top5=cSkus2.slice(0,5);var others=cSkus2.slice(5);
      var pieL2=top5.map(function(s){return(s.sku||s.asin).slice(0,12)});
      var pieD2=top5.map(function(s){return s.net});
