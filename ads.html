      charts['ri-sku-contrib']=new Chart(document.getElementById('ri-sku-contrib'),{type:'doughnut',data:{labels:pieL2,datasets:[{data:pieD2,backgroundColor:pieC2.slice(0,pieL2.length),borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'50%',plugins:{legend:{position:'right',labels:{color:'#6b7280',font:{size:8},padding:4,usePointStyle:true,pointStyleWidth:6}}}}});
    }
  },80);
}


// ── AI Analysis for Analysis tab ──
var _aiHistory=[];
var _aiContext='';

async function runQuickAsk(question){
  var panel=document.getElementById('ai-analysis-panel');
  if(!panel)return;
  if(panel.style.display==='none'||!panel.style.display){
    // Run full analysis first, then ask
    await runAnalysisAI();
    // After analysis loads, ask the question
    setTimeout(function(){
      var qi=document.getElementById('ai-q-input');
      if(qi){qi.value=question;askAnalysisAI();}
    },500);
  } else {
    // Panel already open, just ask
    var qi=document.getElementById('ai-q-input');
    if(qi){qi.value=question;askAnalysisAI();}
  }
}

function buildAnalysisContext(){
  var data=buildRangeData();
  var rs=rangeState;
  var sb=rs.selBrand,sr=rs.selRange,srR=rs.selRangeR,pieMode=rs.pieMode||'cat';
  var isRangeMode=pieMode==='range';
  var df=rs.dayFrom||1,dt2=rs.dayTo||31;
  var hasDayF=df>1||dt2<31;
  var cmpA=rs.compMonthA||'',cmpB=rs.compMonthB||'';
  var sfrMap=getSfrMap();

  var baseRanges=isRangeMode?(data.rangeRanges||[]):data.ranges;
  var filtR=sb==='ALL'?baseRanges:baseRanges.filter(function(r){return r.brand===sb});
  if(sr&&sr!=='ALL')filtR=filtR.filter(function(r){return r.category===sr});
  var filtS=sb==='ALL'?data.skus:data.skus.filter(function(s){return s.brand===sb});
  if(sr&&sr!=='ALL'){filtS=isRangeMode?filtS.filter(function(s){return s.range===sr}):filtS.filter(function(s){return s.category===sr});}

  var filterDesc=(sb==='ALL'?'All Brands':sb)+' | '+(isRangeMode?'Range view':'Category view');
  if(sr&&sr!=='ALL')filterDesc+=' | '+(isRangeMode?'Range':'Category')+': '+sr;
  if(hasDayF)filterDesc+=' | Day '+df+'-'+dt2+' (apples-to-apples)';
  if(cmpA&&cmpB)filterDesc+=' | Comparing '+cmpA+' vs '+cmpB;

  var months=data.sortedMonths;
  var lastMonth=months[months.length-1]||'';

  var catLines=filtR.slice(0,20).map(function(r){
    var sfrKey=r.brand+'|||'+r.category;
    var sfr=isRangeMode?(sfrMap.byRange[sfrKey]):(sfrMap.byCat[sfrKey]);
    var sfrStr=sfr&&sfr.sfr?'SFR#'+sfr.sfr:'';
    var drrSeries=r.monthlyArr.map(function(ma){return monthLabel(ma.month)+':'+riFmt(ma.drr)}).join(' > ');
    return(sb==='ALL'?riBrandShort(r.brand)+' ':'')+r.category+
      ' | Net:'+riFmt(r.net)+' | Spend:'+riFmt(r.ad_spend)+' | TACOS:'+r.tacos+'% | ACOS:'+r.acos+
      '% | Org:'+r.organic_pct+'% | MoM:'+riPct(r.drr_trend)+' | '+sfrStr+
      '\n  DRR: '+drrSeries;
  }).join('\n\n');

  var topSkus=filtS.sort(function(a,b){return b.net-a.net}).slice(0,25).map(function(s){
    var sfrA=sfrMap.byAsin[s.asin];
    var sfrStr=sfrA&&sfrA.sfr?'SFR#'+sfrA.sfr:'';
    var last3=s.monthly.slice(-3).map(function(m){return monthLabel(m.month)+':'+riFmt(m.drr)}).join('>');
    var signal='';
    if(s.mom_drr<-15&&s.tacos>20)signal='DECLINING+HIGH_TACOS';
    else if(s.mom_drr<-15)signal='DECLINING';
    else if(s.tacos>25)signal='HIGH_TACOS';
    else if(s.mom_drr>10&&s.tacos<15)signal='SCALE';
    else if(s.org_pct>85&&s.tacos<5)signal='ORGANIC_STAR';
    return(s.sku||s.asin)+' ['+s.category+(s.range?'/'+s.range:'')+'] '+(signal?'['+signal+']':'')+
      '\n  Net:'+riFmt(s.net)+' Spend:'+riFmt(s.ad_spend)+' TACOS:'+s.tacos+'% ACOS:'+s.acos+
      '% Org:'+s.org_pct+'% MoM:'+riPct(s.mom_drr)+' '+sfrStr+' DRR(3m):'+last3;
  }).join('\n');

  var gainers=filtS.filter(function(s){return s.mom_drr>10&&s.net>50000}).sort(function(a,b){return b.mom_drr-a.mom_drr}).slice(0,5);
  var losers=filtS.filter(function(s){return s.mom_drr<-10&&s.net>50000}).sort(function(a,b){return a.mom_drr-b.mom_drr}).slice(0,5);
  var gainerStr=gainers.map(function(s){return(s.sku||s.asin)+': MoM '+riPct(s.mom_drr)+' DRR '+riFmt(s.latest_drr)+' TACOS '+s.tacos+'%'}).join('\n')||'None';
  var loserStr=losers.map(function(s){return(s.sku||s.asin)+': MoM '+riPct(s.mom_drr)+' DRR '+riFmt(s.latest_drr)+' TACOS '+s.tacos+'%'}).join('\n')||'None';

  var highTacos=filtS.filter(function(s){return s.tacos>20&&s.ad_spend>10000}).sort(function(a,b){return b.tacos-a.tacos}).slice(0,8);
  var tacosStr=highTacos.map(function(s){return(s.sku||s.asin)+': TACOS '+s.tacos+'% Spend '+riFmt(s.ad_spend)+' Net '+riFmt(s.net)}).join('\n')||'All healthy';

  var scaleOpp=filtS.filter(function(s){return s.tacos>0&&s.tacos<12&&s.mom_drr>=0&&s.ad_spend>5000}).sort(function(a,b){return a.tacos-b.tacos}).slice(0,8);
  var scaleStr=scaleOpp.map(function(s){return(s.sku||s.asin)+': TACOS '+s.tacos+'% Spend '+riFmt(s.ad_spend)+' DRR '+riFmt(s.latest_drr)+' MoM '+riPct(s.mom_drr)}).join('\n')||'None';

  var totalNet=filtR.reduce(function(s,r){return s+r.net},0);
  var totalSpend=filtR.reduce(function(s,r){return s+r.ad_spend},0);
  var avgTacos=totalNet>0?(totalSpend/totalNet*100):0;

function buildContext(){
  const bds=getFiltBD();const asins=processAsins(bds);const terms=processTerms(bds,getRankMap());
  let totalSpend=0,totalSales=0,totalUnits=0,totalClicks=0,totalImpr=0;
  asins.forEach(a=>{totalSpend+=a.spend;totalSales+=a.sales;totalUnits+=a.units;totalClicks+=a.clicks;totalImpr+=a.impr||0;});
  bds.forEach(bd=>{const sbd=bd.sb_daily||{};Object.values(sbd).forEach(v=>{totalSpend+=v.spend||0;totalSales+=v.sales||0;totalUnits+=v.units||0;totalClicks+=v.clicks||0;});});
  const acos=totalSales>0?(totalSpend/totalSales*100):0;
  const cpc=totalClicks>0?(totalSpend/totalClicks):0;
  const cvr=totalClicks>0?(totalUnits/totalClicks*100):0;

  // B/G/C split
  const bgc={brand:0,generic:0,comp:0};terms.forEach(t=>{bgc[t.type]+=t.spend;});
  const bgcTotal=bgc.brand+bgc.generic+bgc.comp;

  // Monthly trend with detailed metrics
  const monthly={};
  bds.forEach(bd=>{Object.entries(bd.daily_totals||{}).forEach(([d,v])=>{
    const m=d.slice(0,7);
    if(!monthly[m])monthly[m]={spend:0,sales:0,clicks:0,units:0,impr:0,days:0};
    monthly[m].spend+=v.spend||0;monthly[m].sales+=v.sales||0;
    monthly[m].clicks+=v.clicks||0;monthly[m].units+=v.units||0;monthly[m].impr+=v.impr||0;
    monthly[m].days++;
  });});

  // Weekly trend (last 4 weeks)
  const weekly={};
  bds.forEach(bd=>{Object.entries(bd.daily_totals||{}).forEach(([d,v])=>{
    const dt=new Date(d);const wk=d.slice(0,4)+'-W'+String(Math.ceil((dt.getDate())/7)).padStart(2,'0')+'-'+d.slice(5,7);
    if(!weekly[wk])weekly[wk]={spend:0,sales:0,clicks:0,units:0,label:d.slice(5)};
    weekly[wk].spend+=v.spend||0;weekly[wk].sales+=v.sales||0;weekly[wk].clicks+=v.clicks||0;weekly[wk].units+=v.units||0;
  });});

  // Top 15 ASINs with category/range
  const topAsins=asins.sort((a,b)=>b.spend-a.spend).slice(0,15).map(a=>{
    let aBgc={b:0,g:0,c:0};bds.forEach(bd=>{const ab=bd.asin_bgc||{};const d=ab[a.asin]||{};aBgc.b+=d.brand||0;aBgc.g+=d.generic||0;aBgc.c+=d.comp||0;});
    return{name:a.cleanName||a.sku||a.asin,asin:a.asin,cat:a.cat||'',range:a.range||'',spend:Math.round(a.spend),sales:Math.round(a.sales),acos:isFinite(a.acos)?Math.round(a.acos):999,units:a.units,cvr:a.clicks>0?Math.round(a.units/a.clicks*100):0,bgc:aBgc};
  });

  // Top 25 keywords with organic rank
  const topKw=terms.sort((a,b)=>b.spend-a.spend).slice(0,25).map(t=>({kw:t.keyword,type:t.type,spend:Math.round(t.spend),sales:Math.round(t.sales),acos:t.sales>0?Math.round(t.spend/t.sales*100):999,clicks:t.clicks,units:t.units,cvr:t.clicks>0?Math.round(t.units/t.clicks*100):0,org:t.orgRank||null,camps:t.campaignList?.length||0}));

  // Bleeders
  const bleeders=terms.filter(t=>(t.spend>500&&t.sales===0)||(isFinite(t.acos)&&t.acos>90&&t.spend>500)).sort((a,b)=>b.spend-a.spend).slice(0,15).map(t=>({kw:t.keyword,type:t.type,spend:Math.round(t.spend),sales:Math.round(t.sales),clicks:t.clicks}));
  const totalBleedSpend=bleeders.reduce((s,b)=>s+b.spend,0);

  // Scale opportunities
  const scale=terms.filter(t=>isFinite(t.acos)&&t.acos<=30&&t.sales>500).sort((a,b)=>b.sales-a.sales).slice(0,15).map(t=>({kw:t.keyword,type:t.type,spend:Math.round(t.spend),sales:Math.round(t.sales),acos:Math.round(t.acos),org:t.orgRank||null}));

  // Organic strong but high ad spend
  const orgStrong=terms.filter(t=>t.orgRank&&t.orgRank<=5&&t.spend>200).sort((a,b)=>b.spend-a.spend).slice(0,10).map(t=>({kw:t.keyword,org:t.orgRank,spend:Math.round(t.spend),sales:Math.round(t.sales),acos:t.sales>0?Math.round(t.spend/t.sales*100):999}));

  // High CVR gems (underinvested)
  const gems=terms.filter(t=>t.cvr>=15&&t.clicks>=10&&t.spend<2000).sort((a,b)=>b.cvr-a.cvr).slice(0,10).map(t=>({kw:t.keyword,cvr:Math.round(t.cvr),spend:Math.round(t.spend),sales:Math.round(t.sales),clicks:t.clicks}));

  // Comp conquest (comp keywords with good ACOS)
  const conquest=terms.filter(t=>t.type==='comp'&&isFinite(t.acos)&&t.acos<=40&&t.sales>300).sort((a,b)=>b.sales-a.sales).slice(0,10).map(t=>({kw:t.keyword,spend:Math.round(t.spend),sales:Math.round(t.sales),acos:Math.round(t.acos)}));

  // No organic rank but high spend
  const noOrg=terms.filter(t=>!t.orgRank&&t.spend>1000).sort((a,b)=>b.spend-a.spend).slice(0,10).map(t=>({kw:t.keyword,type:t.type,spend:Math.round(t.spend),sales:Math.round(t.sales)}));

  // Category breakdown (if not filtered)
  const catBreak={};
  asins.forEach(a=>{const c=a.cat||'Other';if(!catBreak[c])catBreak[c]={spend:0,sales:0,units:0};catBreak[c].spend+=a.spend;catBreak[c].sales+=a.sales;catBreak[c].units+=a.units;});

  const dates=[];bds.forEach(bd=>{Object.keys(bd.daily_totals||{}).forEach(d=>dates.push(d));});dates.sort();
  const brandLabel=getBrandLabel();
  const catLabel=S.catFilter!=='all'?S.catFilter:'All Categories';
  const rangeLabel=S.rangeFilter!=='all'?S.rangeFilter:'All Ranges';

  return `You are JARVIS — a senior Amazon Ads strategist and data analyst for Innovist (PAN INDIA VENTURES), an Indian BPC company running 3 brands on Amazon India:
• Bare Anatomy (BA) — hair care: shampoos, conditioners, serums, masks, oils, sprays
• Chemist at Play (CaP) — body & face care: body washes, roll-ons, face washes, serums, lip balms
• SunScoop (SS) — sunscreens

You have deep expertise in Amazon PPC, organic ranking strategy, keyword optimization, and e-commerce P&L. You think like a growth-focused brand manager who understands both performance marketing AND category dynamics.

═══════════════════════════════════════
CURRENT VIEW: ${brandLabel} | ${catLabel} | ${rangeLabel}
PERIOD: ${S.datePeriod==='all'?'All time':S.dateStart+' → '+S.dateEnd} (${dates[0]||'?'} to ${dates[dates.length-1]||'?'})
═══════════════════════════════════════

📊 PERFORMANCE SNAPSHOT:
• Spend: ₹${Math.round(totalSpend).toLocaleString()} | Sales: ₹${Math.round(totalSales).toLocaleString()} | ACOS: ${acos.toFixed(1)}%
• Units: ${totalUnits.toLocaleString()} | Clicks: ${totalClicks.toLocaleString()} | CPC: ₹${cpc.toFixed(1)} | CVR: ${cvr.toFixed(1)}%
• Impressions: ${totalImpr.toLocaleString()} | CTR: ${totalImpr>0?(totalClicks/totalImpr*100).toFixed(2):0}%

${Object.entries(monthly).sort().map(([m,v])=>{const ma=v.sales>0?(v.spend/v.sales*100).toFixed(1):0;const mc=v.clicks>0?(v.spend/v.clicks).toFixed(1):0;const mcvr=v.clicks>0?(v.units/v.clicks*100).toFixed(1):0;return`${m}: Spend ₹${Math.round(v.spend).toLocaleString()} | Sales ₹${Math.round(v.sales).toLocaleString()} | ACOS ${ma}% | Units ${v.units.toLocaleString()} | CPC ₹${mc} | CVR ${mcvr}% | ${v.days}d`;}).join('\n')}

${Object.entries(catBreak).sort((a,b)=>b[1].spend-a[1].spend).map(([c,v])=>`${c}: Spend ₹${Math.round(v.spend).toLocaleString()} | Sales ₹${Math.round(v.sales).toLocaleString()} | ACOS ${v.sales>0?Math.round(v.spend/v.sales*100):999}% | Units ${v.units.toLocaleString()}`).join('\n')}

  const headers=['Keyword','Type','Org Rank','Spend','Sales','ACOS%','Clicks','CPC','Units','CVR%','Impr','CTR%','Campaigns','Match Types'];
  const rows=terms.map(t=>{
    const ac=t.sales>0?(t.spend/t.sales*100):(t.spend>0?999:0);
    return[
      `"${(t.keyword||'').replace(/"/g,'""')}"`,t.type||'',t.orgRank||'',
      Math.round(t.spend),Math.round(t.sales),ac>0&&ac<999?ac.toFixed(1):'',
      t.clicks||0,(t.clicks>0?(t.spend/t.clicks).toFixed(1):''),t.units||0,
      t.cvr>0?t.cvr.toFixed(1):'',t.impr||0,t.ctr>0?t.ctr.toFixed(1):'',
      `"${(t.campaignList||[]).join('; ')}"`,`"${(t.matchList||[]).join(', ')}"`
    ].join(',');
  });
  const csv=headers.join(',')+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`search_terms_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function _mountDrillCharts(cId,labels,units,net,spend,tacos,cvr,acos){
  function safeChart(id,cfg){
    try{
      const c=document.getElementById(id);
      if(!c)return;
      const ex=Chart.getChart(c);if(ex)ex.destroy();
      new Chart(c,cfg);
    }catch(e){console.warn('drill chart',id,e);}
  }
  const sm=labels.length>90;
  const xScale={ticks:{color:'#444',font:{size:8},maxRotation:45,maxTicksLimit:20},grid:{color:'#1c1c25'}};
  const mkY=(pos,color,cb)=>({type:'linear',position:pos,beginAtZero:true,min:0,ticks:{color:color||'#666',font:{size:8},callback:cb||(v=>v),maxTicksLimit:6},grid:pos==='right'?{drawOnChartArea:false}:{color:'#1c1c25'}});
  const base={responsive:true,maintainAspectRatio:false,animation:false,spanGaps:true,plugins:{legend:{labels:{color:'#555',font:{size:9}}}}};

  // Chart 1: Units bar + Net Sales line
  safeChart('dc_sales_'+cId,{type:'bar',data:{labels,datasets:[
    {label:'DRR Units',data:units,yAxisID:'y',backgroundColor:'rgba(167,139,250,.5)',borderColor:'rgba(167,139,250,.8)',borderWidth:1,order:2},
    {label:'Net Sales ₹',data:net,yAxisID:'y1',type:'line',borderColor:'#10b981',backgroundColor:'transparent',pointRadius:sm?0:2,pointBackgroundColor:'#10b981',tension:0.3,borderWidth:1.5,spanGaps:true,order:1}
  ]},options:{...base,scales:{x:xScale,
    y:mkY('left','#a78bfa'),
    y1:mkY('right','#10b981',v=>v>=1000?'₹'+(v/1000).toFixed(0)+'K':'₹'+v)}}});

  // Chart 2: Ad Spend bar + TACOS line
  safeChart('dc_spend_'+cId,{type:'bar',data:{labels,datasets:[
    {label:'Ad Spend ₹',data:spend,yAxisID:'y',backgroundColor:'rgba(245,158,11,.45)',borderColor:'rgba(245,158,11,.8)',borderWidth:1,order:2},
    {label:'TACOS %',data:tacos,yAxisID:'y1',type:'line',borderColor:'#f97316',backgroundColor:'transparent',pointRadius:sm?0:2,pointBackgroundColor:'#f97316',tension:0.3,borderWidth:1.5,spanGaps:true,order:1}
  ]},options:{...base,scales:{x:xScale,
    y:mkY('left','#f59e0b',v=>v>=1000?'₹'+(v/1000).toFixed(0)+'K':'₹'+v),
    y1:mkY('right','#f97316',v=>Number(v).toFixed(0)+'%')}}});

  // Chart 3: CVR line + ACOS line
  safeChart('dc_rates_'+cId,{type:'line',data:{labels,datasets:[
    {label:'CVR %',data:cvr,yAxisID:'y',borderColor:'#22d3ee',backgroundColor:'transparent',pointRadius:sm?0:2,pointBackgroundColor:'#22d3ee',tension:0.3,borderWidth:1.5,spanGaps:true},
    {label:'ACOS %',data:acos,yAxisID:'y1',borderColor:'#ef4444',backgroundColor:'transparent',pointRadius:sm?0:2,pointBackgroundColor:'#ef4444',tension:0.3,borderWidth:1.5,spanGaps:true}
  ]},options:{...base,scales:{x:xScale,
    y:mkY('left','#22d3ee',v=>Number(v).toFixed(0)+'%'),
    y1:mkY('right','#ef4444',v=>Number(v).toFixed(0)+'%')}}});
}

async function sendJarvis(){
  const input=document.getElementById('jarvis-q');
  const q=input.value.trim();if(!q)return;
  input.value='';
  addJarvisMsg('user',q);
  document.getElementById('jarvis-suggestions').innerHTML='';
  const thinkDiv=addJarvisMsg('ai','Analyzing your data...');
  thinkDiv.innerHTML='<span class="thinking">Analyzing your data...</span>';

  try{
    const context=buildContext();
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        system:context,
        messages:[{role:'user',content:q}]
      })
    });
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'Sorry, I could not analyze this. Please try again.';
    thinkDiv.className='jarvis-msg ai';
    thinkDiv.textContent=text;
    showSuggestions(['Deep dive on bleeding keywords','MoM trend analysis','Where to cut ₹1L spend safely?','Comp conquest strategy','Which keywords need organic push?']);
  }catch(e){
    thinkDiv.className='jarvis-msg ai';
    thinkDiv.textContent='Error connecting to AI. Check your connection and try again.';
  }
  document.getElementById('jarvis-msgs').scrollTop=999999;
}

function runJarvisAnalysis(){
  openJarvisChat();
  setTimeout(()=>{
    const brandLabel=getBrandLabel();
    const catLabel=S.catFilter!=='all'?S.catFilter:'';
    const rangeLabel=S.rangeFilter!=='all'?S.rangeFilter:'';
    const context=catLabel?`${brandLabel} ${catLabel} ${rangeLabel}`:brandLabel;
    document.getElementById('jarvis-q').value=`Give me a quick performance summary and top 3 actionable recommendations for ${context}`;
    sendJarvis();
  },300);
}
